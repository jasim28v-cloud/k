<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHADOW OS | THE ULTIMATE EMPIRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --border-glow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        body, html { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            overflow: hidden; font-family: 'Rajdhani', sans-serif;
            height: 100%; width: 100%;
        }

        /* حاوية الفيديو العملاقة */
        .app-container { 
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .app-container::-webkit-scrollbar { display: none; }

        .video-card { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        /* خلفية الفيديو المحسنة */
        .video-wrapper { position: absolute; inset: 0; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8) contrast(1.1); }

        /* تأثيرات الإضاءة السينمائية */
        .overlay-fx {
            position: absolute; inset: 0; z-index: 2;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        /* واجهة الـ HUD (Heads-Up Display) */
        .hud-frame {
            position: absolute; inset: 20px; border: 1px solid rgba(0, 243, 255, 0.1);
            pointer-events: none; z-index: 10; border-radius: 20px;
        }
        
        .corner { position: absolute; width: 30px; height: 30px; border: 2px solid var(--neon-blue); }
        .top-left { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .top-right { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
        .bottom-right { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

        /* الأزرار الجانبية الفاخرة */
        .action-dock {
            position: absolute; right: 20px; bottom: 100px; z-index: 100;
            display: flex; flex-direction: column; gap: 15px;
        }
        .action-btn {
            width: 60px; height: 60px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            transition: 0.3s all cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .action-btn:active { transform: scale(0.9); border-color: var(--neon-purple); }
        .action-btn i { font-size: 1.2rem; margin-bottom: 2px; }
        .action-btn span { font-size: 9px; color: var(--neon-blue); font-weight: 700; }

        /* شريط المعلومات السفلي */
        .info-panel {
            position: absolute; bottom: 40px; left: 30px; z-index: 100;
            max-width: 70%; pointer-events: none;
        }

        .status-badge {
            background: rgba(0, 243, 255, 0.1); color: var(--neon-blue);
            padding: 4px 12px; border-radius: 4px; font-size: 10px;
            border: 1px solid rgba(0, 243, 255, 0.2); display: inline-block; margin-bottom: 10px;
        }

        /* تصميم الخطوط العريضة */
        .big-title {
            font-family: 'Orbitron'; font-weight: 900; font-size: clamp(2rem, 8vw, 4rem);
            line-height: 0.9; text-transform: uppercase; letter-spacing: -2px;
            background: linear-gradient(to right, #fff, #00f3ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* لودر البداية */
        #init-loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="init-loader">
        <div class="mb-4 text-cyan-400 font-bold tracking-[10px] animate-pulse">SHΔDØW_OS_LOADING</div>
        <div class="w-48 h-[2px] bg-white/10 relative">
            <div class="absolute inset-0 bg-cyan-400 animate-[loading_2s_infinite]"></div>
        </div>
    </div>

    <header class="fixed top-0 w-full z-[1000] p-6 flex justify-between pointer-events-none">
        <div class="flex items-center gap-4">
            <div class="h-10 w-1 bg-cyan-500 shadow-[0_0_10px_#00f3ff]"></div>
            <div>
                <div class="text-[10px] text-white/40 uppercase tracking-[4px]">Global Archive</div>
                <div class="font-black text-xl tracking-tighter" style="font-family: 'Orbitron';">EMPIRE<span class="text-cyan-400">.V4</span></div>
            </div>
        </div>
        <div class="text-right">
            <div id="live-timer" class="text-cyan-400 font-bold text-sm">00:00:00</div>
            <div class="text-[8px] text-white/20 uppercase">Core Temperature: 32°C</div>
        </div>
    </header>

    <main class="app-container" id="feed-engine"></main>

    <script>
        // تفكيك الرابط الذكي
        const collectionLink = "https://collection.cloudinary.com/dssk5tabb/3f7d9a2f9265b9a008994ca0b5efb125";
        const accountID = collectionLink.split('/')[3]; 
        const totalNodes = 27; 

        const engine = document.getElementById('feed-engine');

        // بناء الواجهة الضخمة
        for (let i = 1; i <= totalNodes; i++) {
            const nodeID = `video${i}`;
            const section = document.createElement('section');
            section.className = 'video-card';
            section.innerHTML = `
                <div class="hud-frame">
                    <div class="corner top-left"></div><div class="corner top-right"></div>
                    <div class="corner bottom-left"></div><div class="corner bottom-right"></div>
                </div>
                
                <div class="video-wrapper">
                    <video loop playsinline muted src="https://res.cloudinary.com/${accountID}/video/upload/q_auto:best,f_auto/${nodeID}.mp4"></video>
                </div>
                <div class="overlay-fx"></div>

                <div class="action-dock">
                    <div class="action-btn text-white"><i class="fas fa-shield-halved"></i><span>ENCRYPT</span></div>
                    <div class="action-btn text-red-500"><i class="fas fa-heart"></i><span>${(Math.random()*99).toFixed(1)}K</span></div>
                    <div class="action-btn text-cyan-400"><i class="fas fa-comment-dots"></i><span>742</span></div>
                    <div class="action-btn text-white"><i class="fas fa-expand"></i><span>FULL</span></div>
                </div>

                <div class="info-panel">
                    <div class="status-badge"><i class="fas fa-satellite-dish mr-2"></i> LIVE_NODE_${i}</div>
                    <h2 class="big-title">Visual<br>Command ${i}</h2>
                    <p class="text-white/40 text-[10px] mt-4 tracking-[3px] uppercase">Data Source: ${accountID} // Protocol: Secure_SSL</p>
                </div>

                <div class="absolute right-10 top-1/2 -translate-y-1/2 flex flex-col items-center gap-2 pointer-events-none opacity-20">
                    <div class="text-[8px] vertical-text uppercase tracking-widest">System Optimization Active</div>
                    <div class="w-[1px] h-32 bg-white/50"></div>
                </div>
            `;
            engine.appendChild(section);
        }

        // إخفاء شاشة التحميل
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('init-loader').style.opacity = '0', 1000);
            setTimeout(() => document.getElementById('init-loader').style.display = 'none', 1500);
        });

        // مراقب التشغيل الذكي
        const io = new IntersectionObserver((items) => {
            items.forEach(item => {
                const v = item.target.querySelector('video');
                if (item.isIntersecting) {
                    v.play();
                } else {
                    v.pause(); v.currentTime = 0;
                }
            });
        }, { threshold: 0.7 });

        document.querySelectorAll('.video-card').forEach(card => io.observe(card));

        // الوقت الحي
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-timer').innerText = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
        }, 1000);

        // تفعيل الصوت عند أول لمسة للموقع
        window.addEventListener('click', () => {
            document.querySelectorAll('video').forEach(v => v.muted = false);
        }, { once: true });
    </script>

    <style>
        @keyframes loading { 0% { left: -100%; width: 30%; } 50% { width: 60%; } 100% { left: 100%; width: 30%; } }
        .vertical-text { writing-mode: vertical-rl; transform: rotate(180deg); }
    </style>
</body>
</html>
