<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELYTRA | NEXT-GEN UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@200;800&display=swap');
        
        :root { --elytra-green: #00ffaa; --glass-core: rgba(0, 255, 170, 0.05); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        
        /* Smooth Fluid Feed */
        .elytra-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .elytra-feed::-webkit-scrollbar { display: none; }
        
        .video-container { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { height: 100%; width: 100%; object-fit: cover; filter: contrast(1.05) brightness(0.9); }

        /* Floating Crystal Header */
        .elytra-nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid rgba(0, 255, 170, 0.2);
        }
        .elytra-logo { font-family: 'Syncopate'; font-size: 20px; color: var(--elytra-green); letter-spacing: 5px; text-shadow: 0 0 15px var(--elytra-green); }

        /* Holographic Sidebar */
        .side-actions { position: absolute; right: 20px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .hologram-btn {
            width: 60px; height: 60px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(0, 255, 170, 0.1); cursor: pointer; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .hologram-btn:hover { border-color: var(--elytra-green); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 255, 170, 0.2); }
        .hologram-btn i { font-size: 22px; color: #fff; transition: 0.3s; }
        .hologram-btn:active i { color: var(--elytra-green); transform: scale(0.8); }
        .hologram-btn span { font-size: 9px; font-weight: 800; margin-top: 4px; color: var(--elytra-green); letter-spacing: 1px; }

        /* Video Info Block */
        .video-meta { position: absolute; left: 25px; bottom: 110px; right: 100px; z-index: 100; }
        .elytra-badge { background: linear-gradient(135deg, var(--elytra-green), #0088ff); color: #000; padding: 5px 15px; border-radius: 30px; font-size: 11px; font-weight: 900; display: inline-block; margin-bottom: 12px; }

        /* Main Controller Dock */
        .dock-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 420px; height: 75px; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(40px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .dock-item { color: rgba(255, 255, 255, 0.3); font-size: 20px; cursor: pointer; transition: 0.3s; }
        .dock-item.active { color: var(--elytra-green); filter: drop-shadow(0 0 8px var(--elytra-green)); }
        
        .elytra-upload {
            background: #fff; color: #000; width: 55px; height: 55px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            cursor: pointer; transition: 0.4s; transform: rotate(45deg);
        }
        .elytra-upload:hover { transform: rotate(135deg); background: var(--elytra-green); }
        .elytra-upload i { transform: rotate(-45deg); }
    </style>
</head>
<body>

    <nav class="elytra-nav">
        <div class="elytra-logo">ELYTRA</div>
        <div class="flex items-center gap-3">
            <span class="text-[10px] font-black opacity-40 tracking-[4px]">OS_2.6</span>
            <div class="w-2 h-2 bg-[#00ffaa] rounded-full shadow-[0_0_10px_#00ffaa]"></div>
        </div>
    </nav>

    <div class="elytra-feed" id="main-render"></div>

    <div class="dock-container">
        <div class="dock-item active"><i class="fas fa-compass"></i></div>
        <div class="elytra-upload" onclick="startFlow()"><i class="fas fa-plus"></i></div>
        <div class="dock-item"><i class="fas fa-adjust"></i></div>
    </div>

    <script>
        // System Core
        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = [
            "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec",
            "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        ];

        function callAd(n) { window.open(AD_LINKS[n], '_blank'); }

        const widget = cloudinary.createUploadWidget({
            cloudName: "dqzjfaqg4", 
            uploadPreset: "vox_god"
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('elytra_posts').push({
                    url: res.info.secure_url,
                    tag: "ELY_" + Math.floor(Math.random()*9999),
                    points: Math.floor(Math.random()*100),
                    time: Date.now()
                });
            }
        });

        function startFlow() { widget.open(); }

        db.ref('elytra_posts').orderByChild('time').on('value', snap => {
            const feed = document.getElementById('main-render');
            feed.innerHTML = '';
            let dataList = [];
            snap.forEach(c => { dataList.unshift({id: c.key, ...c.val()}); });
            
            dataList.forEach(item => {
                feed.innerHTML += `
                    <div class="video-container">
                        <video src="${item.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="side-actions">
                            <div class="hologram-btn" onclick="callAd(0); db.ref('elytra_posts/${item.id}').update({points:${item.points + 1}})">
                                <i class="fas fa-bolt"></i>
                                <span>${item.points}</span>
                            </div>
                            <div class="hologram-btn" onclick="callAd(1)">
                                <i class="fas fa-comment-alt"></i>
                                <span>VOID</span>
                            </div>
                            <div class="hologram-btn" onclick="callAd(0)">
                                <i class="fas fa-share-nodes"></i>
                                <span>PUSH</span>
                            </div>
                        </div>
                        <div class="video-meta">
                            <div class="elytra-badge">@${item.tag}</div>
                            <p class="text-[11px] font-extrabold opacity-40 uppercase tracking-[3px]">Elytra Neural Link // Global Public Feed</p>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
