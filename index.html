<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHADOW OS | FIXED FEED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;600&display=swap');
        :root { --neon-blue: #00f3ff; --glass: rgba(0, 0, 0, 0.6); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
        .app-container { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .app-container::-webkit-scrollbar { display: none; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        .video-background { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 25%, transparent 75%, rgba(0,0,0,0.9) 100%); z-index: 2; pointer-events: none; }
        .side-dock { position: absolute; right: 20px; bottom: 120px; z-index: 100; display: flex; flex-direction: column; gap: 20px; }
        .dock-item { width: 50px; height: 50px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        .progress-line { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--neon-blue); width: 0%; z-index: 100; }
    </style>
</head>
<body>

    <div class="fixed top-0 w-full z-[1000] p-6 flex justify-between items-start pointer-events-none">
        <div>
            <h1 class="font-black text-2xl tracking-tighter" style="font-family: 'Orbitron';">SHΔDØW<span class="text-cyan-400">.OS</span></h1>
            <div id="clock" class="text-xs text-white/50">00:00:00</div>
        </div>
    </div>

    <div class="app-container" id="feed"></div>

    <script>
        // الرابط الذي أرسلته لي
        const baseUrl = "https://res.cloudinary.com/dssk5tabb/video/upload/v1/38d13a282ddd2f7131580273fefff368/";

        const videos = [
            { id: '1cowgirl.mp4', title: 'Phase 01' },
            { id: '2cowgirl.mp4', title: 'Phase 02' },
            { id: '3cowgirl.mp4', title: 'Phase 03' },
            { id: '4cowgirl.mp4', title: 'Phase 04' },
            { id: '5cowgirl.mp4', title: 'Phase 05' }
        ];

        const feed = document.getElementById('feed');
        
        videos.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            // دمج الرابط الأساسي مع اسم الفيديو
            const videoSrc = baseUrl + item.id;
            
            card.innerHTML = `
                <div class="video-background">
                    <video loop playsinline muted src="${videoSrc}"></video>
                </div>
                <div class="vignette"></div>
                <div class="progress-line"></div>
                <div class="side-dock">
                    <div class="dock-item text-red-500"><i class="fas fa-heart"></i></div>
                    <div class="dock-item text-cyan-400"><i class="fas fa-comment-dots"></i></div>
                </div>
                <div class="absolute bottom-10 left-8 z-[100] pointer-events-none">
                    <h2 class="text-3xl font-black uppercase italic" style="font-family:'Orbitron';">${item.title}</h2>
                    <p class="text-white/40 text-xs tracking-[4px]">STREAMING FROM CLOUD</p>
                </div>
            `;
            feed.appendChild(card);
        });

        // تشغيل الفيديو عند الظهور
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const vid = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    vid.play().catch(err => console.log("تحتاج للنقر لتشغيل الصوت"));
                } else {
                    vid.pause();
                }
            });
        }, { threshold: 0.7 });

        document.querySelectorAll('.video-card').forEach(c => observer.observe(c));

        // لتحديث الخط الزمني
        document.querySelectorAll('video').forEach(vid => {
            vid.ontimeupdate = () => {
                const line = vid.closest('.video-card').querySelector('.progress-line');
                line.style.width = (vid.currentTime / vid.duration) * 100 + '%';
            };
        });

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // تفعيل الصوت عند أول نقرة
        window.onclick = () => { document.querySelectorAll('video').forEach(v => v.muted = false); };
    </script>
</body>
</html>
