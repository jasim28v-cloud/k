<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO HOMEWORK | SHADOW CINEMA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff0000;
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
            --text-glow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        /* خلفية مزينة بتأثير الغبار الرقمي */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* الهيدر الفخم */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            margin: 0;
            letter-spacing: 5px;
            background: linear-gradient(to bottom, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(var(--text-glow));
        }

        header p {
            color: var(--primary-color);
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* صندوق المشغل الاحترافي */
        .video-vault {
            position: relative;
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 20px;
            padding: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
        }

        .video-vault::after {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary-color), transparent, var(--primary-color));
            z-index: -1;
            border-radius: 22px;
            opacity: 0.3;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 12px;
            overflow: hidden;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        /* تفاصيل أسفل الفيديو */
        .video-info {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
        }

        .badge {
            background: var(--primary-color);
            color: #fff;
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .btn-download {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: #fff;
            padding: 10px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-download:hover {
            background: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-color);
        }

        /* تأثيرات الحركة */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .video-vault { animation: fadeIn 1s ease-out; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>STUDIO HOMEWORK</h1>
        <p>• SHADOW STREAMING SERVER V99 •</p>
    </header>

    <div class="video-vault">
        <div class="iframe-container">
            <iframe 
                src="https://mypikpak.com/s/VOmLsWNW-NbOvA9b_54tcn_go2" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <div class="video-info">
        <div>
            <span class="badge">4K ULTRA HD</span>
            <h2 style="margin: 10px 0 0 0;">قائمة العرض الحصرية</h2>
        </div>
        <a href="#" class="btn-download">تنزيل المحتوى</a>
    </div>
</div>

</body>
</html>
