<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO HOMEWORK | SHADOW V99</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire-red: #ff0000;
            --deep-void: #020202;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--deep-void);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* خلفية سينمائية متحركة */
        .background-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #110000 0%, #020202 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        /* الهيدر الاحترافي لموقع Studio Homework */
        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 8px;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.4));
        }

        header p {
            color: var(--fire-red);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* إطار المشغل الرئيسي */
        .main-player-vault {
            position: relative;
            background: var(--glass);
            border: 1px solid #1a1a1a;
            border-radius: 30px;
            padding: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .iframe-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        /* قائمة الأفلام الجانبية/السفلية */
        .movie-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .movie-card {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .movie-card:hover {
            border-color: var(--fire-red);
            transform: translateY(-10px);
            background: rgba(255, 0, 0, 0.05);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
        }

        .movie-card .play-btn {
            font-size: 1.5rem;
            color: var(--fire-red);
            margin-bottom: 10px;
            display: block;
        }

        .movie-card span {
            font-size: 0.8rem;
            color: #888;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="background-glow"></div>

<div class="container">
    <header>
        <h1>STUDIO HOMEWORK</h1>
        <p>Ultra HD Media Streaming Server</p>
    </header>

    <div class="main-player-vault">
        <div class="iframe-wrapper">
            <iframe src="https://collection.cloudinary.com/dssk5tabb/38d13a282ddd2f7131580273fefff368" allowfullscreen></iframe>
        </div>
    </div>

    <div class="movie-list">
        <div class="movie-card">
            <i class="play-btn">▶</i>
            <span>1cowgirl.mp4</span>
        </div>
        <div class="movie-card">
            <i class="play-btn">▶</i>
            <span>2cowgirl.mp4</span>
        </div>
        <div class="movie-card">
            <i class="play-btn">▶</i>
            <span>3cowgirl.mp4</span>
        </div>
        <div class="movie-card">
            <i class="play-btn">▶</i>
            <span>4cowgirl.mp4</span>
        </div>
        <div class="movie-card">
            <i class="play-btn">▶</i>
            <span>5cowgirl.mp4</span>
        </div>
    </div>
</div>

</body>
</html>
