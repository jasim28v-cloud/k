<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELYTRA | ULTIMATE SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@200;800&display=swap');
        :root { --green: #00ffaa; --glass: rgba(0, 255, 170, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: white; user-select: none; }
        
        /* Container for all videos */
        .elytra-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -ms-overflow-style: none; }
        .elytra-feed::-webkit-scrollbar { display: none; }
        
        .video-unit { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { height: 100%; width: 100%; object-fit: cover; pointer-events: none; }

        /* Progress Bar */
        .v-progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--green); z-index: 2000; width: 0%; transition: width 0.1s linear; box-shadow: 0 0 10px var(--green); }

        /* UI elements */
        .elytra-header { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 92%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--glass); }
        .brand { font-family: 'Syncopate'; font-size: 20px; color: var(--green); letter-spacing: 4px; text-shadow: 0 0 10px var(--green); }

        .side-stack { position: absolute; right: 15px; bottom: 130px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .action-circle { width: 60px; height: 60px; background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); border-radius: 50%; border: 1px solid var(--glass); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .action-circle i { font-size: 22px; color: #fff; }
        .action-circle span { font-size: 10px; font-weight: 800; margin-top: 4px; color: var(--green); }

        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; height: 75px; background: rgba(0,0,0,0.7); backdrop-filter: blur(40px); border-radius: 35px; border: 1px solid var(--glass); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        
        .upload-trigger { background: var(--green); color: #000; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; transition: 0.4s; transform: rotate(45deg); box-shadow: 0 0 20px rgba(0,255,170,0.3); }
        .upload-trigger:active { transform: rotate(135deg) scale(0.9); }
        .upload-trigger i { transform: rotate(-45deg); }

        .meta-box { position: absolute; left: 20px; bottom: 110px; z-index: 100; pointer-events: none; }
        .user-tag { background: rgba(0,255,170,0.1); border: 1px solid var(--green); padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 800; color: var(--green); margin-bottom: 8px; display: inline-block; }

        /* Heart animation */
        .h-pop { position: absolute; color: var(--green); font-size: 50px; animation: pop 0.8s ease-out forwards; pointer-events: none; z-index: 1000; }
        @keyframes pop { 0% { transform: scale(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-120px) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div class="v-progress" id="globalProgress"></div>

    <nav class="elytra-header">
        <div class="brand">ELYTRA</div>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-[#00ffaa] rounded-full animate-pulse"></div>
            <span class="text-[9px] font-black opacity-40 uppercase">Neural Stream</span>
        </div>
    </nav>

    <div class="elytra-feed" id="videoFeed"></div>

    <div class="bottom-nav">
        <i class="fas fa-th-large text-white opacity-30 text-xl"></i>
        <div class="upload-trigger" id="uploadBtn"><i class="fas fa-plus"></i></div>
        <i class="fas fa-compass text-white opacity-30 text-xl"></i>
    </div>

    <script>
        // 1. Database Configuration
        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_URL = "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec";

        // 2. Optimized Upload (Direct Gallery)
        const myWidget = cloudinary.createUploadWidget({
            cloudName: "dqzjfaqg4", 
            uploadPreset: "vox_god",
            sources: ['local'], // Opens local gallery directly
            multiple: false
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                db.ref('elytra_v_final').push({
                    url: result.info.secure_url,
                    user: "E_" + Math.floor(Math.random()*999),
                    likes: Math.floor(Math.random()*10),
                    timestamp: Date.now()
                });
            }
        });

        document.getElementById('uploadBtn').addEventListener('click', () => myWidget.open());

        // 3. Floating Hearts Function
        function spawnHeart(x, y) {
            const h = document.createElement('i');
            h.className = 'fas fa-heart h-pop';
            h.style.left = x + 'px'; h.style.top = y + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 800);
        }

        // 4. Render All Videos from Database
        db.ref('elytra_v_final').on('value', snap => {
            const feed = document.getElementById('videoFeed');
            feed.innerHTML = ''; // Clear and rebuild
            let posts = [];
            snap.forEach(child => { posts.unshift({id: child.key, ...child.val()}); });

            posts.forEach(post => {
                const container = document.createElement('div');
                container.className = 'video-unit';
                container.innerHTML = `
                    <video src="${post.url}" loop playsinline></video>
                    <div class="side-stack">
                        <div class="action-circle" onclick="window.open('${AD_URL}','_blank'); firebase.database().ref('elytra_v_final/${post.id}').update({likes:${post.likes + 1}})">
                            <i class="fas fa-bolt text-[#00ffaa]"></i>
                            <span>${post.likes}</span>
                        </div>
                        <div class="action-circle" onclick="window.open('${AD_URL}','_blank')">
                            <i class="fas fa-comment-dots"></i>
                            <span>VOID</span>
                        </div>
                        <div class="action-circle" onclick="window.open('${AD_URL}','_blank')">
                            <i class="fas fa-share"></i>
                            <span>PUSH</span>
                        </div>
                    </div>
                    <div class="meta-box">
                        <div class="user-tag">@${post.user}</div>
                        <p class="text-[10px] font-black opacity-30 tracking-[3px]">ELYTRA CORE V.FINAL // SECURE</p>
                    </div>
                `;

                const video = container.querySelector('video');
                
                // Double Tap to Like
                container.addEventListener('dblclick', (e) => {
                    spawnHeart(e.clientX, e.clientY);
                    db.ref('elytra_v_final/' + post.id).update({likes: post.likes + 1});
                });

                // Single Tap to Play/Pause
                container.addEventListener('click', () => video.paused ? video.play() : video.pause());

                // Progress Bar Update
                video.addEventListener('timeupdate', () => {
                    if (video.closest('.video-unit').getBoundingClientRect().top === 0) {
                        const prog = (video.currentTime / video.duration) * 100;
                        document.getElementById('globalProgress').style.width = prog + '%';
                    }
                });

                feed.appendChild(container);
            });
        });
    </script>
</body>
</html>
