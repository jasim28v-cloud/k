<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX RED | INFINITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;700&display=swap');
        
        :root { --red-glare: #ff0033; --glass: rgba(255, 0, 51, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #050000; font-family: 'Space Grotesk', sans-serif; color: white; }
        
        /* Cinematic Feed */
        .main-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .main-engine::-webkit-scrollbar { display: none; }
        
        .v-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; }
        video { height: 100%; width: 100%; object-fit: cover; filter: brightness(0.9) contrast(1.1); }

        /* Luxury Red Glass Header */
        .red-header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px; background: linear-gradient(to bottom, rgba(255,0,51,0.2), transparent);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,0,51,0.1);
        }
        .brand { font-family: 'Syncopate'; font-size: 24px; color: var(--red-glare); text-shadow: 0 0 20px var(--red-glare); letter-spacing: 3px; }

        /* Side Interactions */
        .interaction-panel { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 22px; z-index: 100; }
        .glass-node {
            width: 62px; height: 62px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(255,0,51,0.3); cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-node:active { transform: scale(0.8) rotate(-10deg); border-color: white; }
        .glass-node i { font-size: 24px; color: var(--red-glare); filter: drop-shadow(0 0 5px var(--red-glare)); }
        .glass-node span { font-size: 10px; font-weight: 700; margin-top: 5px; color: #fff; text-transform: uppercase; }

        /* Info Layer */
        .info-layer {
            position: absolute; left: 20px; bottom: 100px; right: 85px; z-index: 100;
        }
        .user-tag { 
            background: linear-gradient(90deg, var(--red-glare), #770018); 
            padding: 6px 15px; border-radius: 5px; font-size: 12px; font-weight: 900; 
            display: inline-block; margin-bottom: 10px; box-shadow: 0 0 15px rgba(255,0,51,0.4);
        }

        /* Glass Bottom Navigation */
        .nav-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; height: 70px; background: rgba(20,0,0,0.6);
            backdrop-filter: blur(30px); border-radius: 20px; border: 1px solid rgba(255,0,51,0.2);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-icon { font-size: 22px; color: rgba(255,255,255,0.3); transition: 0.3s; }
        .nav-icon.active { color: var(--red-glare); }
        .upload-btn {
            background: var(--red-glare); color: white; padding: 12px 30px; border-radius: 12px;
            font-weight: 900; font-size: 13px; letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(255,0,51,0.5); cursor: pointer; border: none;
        }
    </style>
</head>
<body>

    <nav class="red-header">
        <div class="brand">VOX RED</div>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
            <span class="text-[9px] font-bold tracking-[3px] opacity-70">LIVE STREAM</span>
        </div>
    </nav>

    <div class="main-engine" id="feed-container"></div>

    <div class="nav-dock">
        <i class="fas fa-th-large nav-icon active"></i>
        <button class="upload-btn" onclick="openUploader()">UPLOAD</button>
        <i class="fas fa-globe-americas nav-icon"></i>
    </div>

    <script>
        // Firebase & Cloudinary Data
        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ADS = [
            "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec",
            "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        ];

        function triggerAd(i) { window.open(ADS[i], '_blank'); }

        const widget = cloudinary.createUploadWidget({
            cloudName: "dqzjfaqg4", 
            uploadPreset: "vox_god"
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('public_posts').push({
                    url: res.info.secure_url,
                    user: "Elite_User_" + Math.floor(Math.random()*999),
                    likes: Math.floor(Math.random()*50),
                    time: Date.now()
                });
            }
        });

        function openUploader() { widget.open(); }

        db.ref('public_posts').orderByChild('time').on('value', snap => {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            let posts = [];
            snap.forEach(child => { posts.unshift({id: child.key, ...child.val()}); });
            
            posts.forEach(p => {
                container.innerHTML += `
                    <div class="v-card">
                        <video src="${p.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="interaction-panel">
                            <div class="glass-node" onclick="triggerAd(0); db.ref('public_posts/${p.id}').update({likes:${p.likes + 1}})">
                                <i class="fas fa-heart"></i>
                                <span>${p.likes}</span>
                            </div>
                            <div class="glass-node" onclick="triggerAd(1)">
                                <i class="fas fa-comment-alt"></i>
                                <span>REPLY</span>
                            </div>
                            <div class="glass-node" onclick="triggerAd(0)">
                                <i class="fas fa-share-nodes"></i>
                                <span>SHARE</span>
                            </div>
                        </div>
                        <div class="info-layer">
                            <div class="user-tag">@${p.user}</div>
                            <p class="text-[10px] font-bold opacity-50 uppercase tracking-[2px]">Core Red System // No Login Required</p>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
