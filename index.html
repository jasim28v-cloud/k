<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELYTRA | ULTIMATE NEURAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@200;400;800&display=swap');
        :root { --green: #00ffaa; --glass: rgba(0, 255, 170, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: white; user-select: none; }
        
        .elytra-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .elytra-feed::-webkit-scrollbar { display: none; }
        
        .video-unit { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        video { height: 100%; width: 100%; object-fit: cover; }

        /* Progress Bar */
        .v-progress { position: absolute; top: 0; left: 0; height: 2px; background: var(--green); z-index: 1001; transition: width 0.1s linear; box-shadow: 0 0 10px var(--green); }

        /* Hearts Animation */
        .heart { position: absolute; pointer-events: none; color: var(--green); font-size: 40px; animation: fly 0.8s ease-out forwards; z-index: 500; }
        @keyframes fly { 0% { transform: scale(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }

        /* UI Elements */
        .elytra-header { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); width: 90%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--glass); }
        .brand { font-family: 'Syncopate'; font-size: 18px; color: var(--green); letter-spacing: 4px; text-shadow: 0 0 10px var(--green); }

        .side-stack { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .action-circle { width: 55px; height: 55px; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border-radius: 50%; border: 1px solid var(--glass); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .action-circle i { font-size: 20px; color: #fff; }
        .action-circle span { font-size: 9px; font-weight: 800; margin-top: 4px; color: var(--green); }

        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; height: 70px; background: rgba(0,0,0,0.7); backdrop-filter: blur(40px); border-radius: 35px; border: 1px solid var(--glass); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .plus-icon { background: var(--green); color: #000; width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: 0.4s; transform: rotate(45deg); }
        .plus-icon:hover { transform: rotate(135deg); }

        .meta-box { position: absolute; left: 20px; bottom: 100px; z-index: 100; }
        .user-pill { background: rgba(0,255,170,0.15); border: 1px solid var(--green); padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: 800; color: var(--green); }
        
        /* Floating Text Layer */
        .neural-info { font-size: 8px; color: rgba(255,255,255,0.2); text-transform: uppercase; margin-top: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="v-progress" id="p-bar"></div>

    <nav class="elytra-header">
        <div class="brand">ELYTRA</div>
        <div class="flex items-center gap-2"><div class="w-1.5 h-1.5 bg-[#00ffaa] rounded-full animate-ping"></div><span class="text-[8px] opacity-40 font-bold">NEURAL_OS</span></div>
    </nav>

    <div class="elytra-feed" id="main-feed"></div>

    <div class="bottom-nav">
        <i class="fas fa-home-alt text-white opacity-40"></i>
        <div class="plus-icon" onclick="up()"><i class="fas fa-plus" style="transform: rotate(-45deg)"></i></div>
        <i class="fas fa-user-circle text-white opacity-40"></i>
    </div>

    <script>
        const f_config = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(f_config);
        const db = firebase.database();

        const ADS = ["https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec", "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"];
        function ad(n) { window.open(ADS[n], '_blank'); }

        const widget = cloudinary.createUploadWidget({ cloudName: "dqzjfaqg4", uploadPreset: "vox_god" }, (err, res) => {
            if (res.event === "success") {
                db.ref('elytra_final').push({ url: res.info.secure_url, user: "U_"+Math.floor(Math.random()*999), likes: 0, time: Date.now() });
            }
        });
        function up() { widget.open(); }

        function showHearts(e) {
            const h = document.createElement('i');
            h.className = 'fas fa-heart heart';
            h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 800);
        }

        db.ref('elytra_final').on('value', snap => {
            const feed = document.getElementById('main-feed');
            feed.innerHTML = '';
            let data = []; snap.forEach(c => data.unshift({id: c.key, ...c.val()}));
            
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = 'video-unit';
                card.innerHTML = `
                    <video src="${p.url}" loop playsinline></video>
                    <div class="side-stack">
                        <div class="action-circle" onclick="ad(0); db.ref('elytra_final/${p.id}').update({likes:${p.likes+1}})">
                            <i class="fas fa-bolt text-[#00ffaa]"></i><span>${p.likes}</span>
                        </div>
                        <div class="action-circle" onclick="ad(1)"><i class="fas fa-comment-dots"></i><span>VOID</span></div>
                        <div class="action-circle" onclick="ad(0)"><i class="fas fa-paper-plane"></i><span>PUSH</span></div>
                    </div>
                    <div class="meta-box">
                        <div class="user-pill">@${p.user}</div>
                        <div class="neural-info">Syncing Content // Encryption Alpha_01</div>
                    </div>
                `;
                
                const vid = card.querySelector('video');
                vid.addEventListener('timeupdate', () => {
                    const progress = (vid.currentTime / vid.duration) * 100;
                    document.getElementById('p-bar').style.width = progress + '%';
                });
                card.addEventListener('click', () => vid.paused ? vid.play() : vid.pause());
                card.addEventListener('dblclick', (e) => {
                    showHearts(e);
                    db.ref('elytra_final/'+p.id).update({likes:p.likes+1});
                });
                feed.appendChild(card);
            });
        });
    </script>
</body>
</html>
