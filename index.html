<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW CORE | V99 UPDATER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono:wght@400;700&display=swap');
        :root { --neon: #ff003c; --bg: #050505; }
        body, html { margin: 0; background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; overflow: hidden; height: 100%; width: 100%; }
        .viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -ms-overflow-style: none; }
        .viewport::-webkit-scrollbar { display: none; }
        .card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); z-index: 1; }
        .overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 50%, rgba(0,0,0,0.4) 100%); pointer-events: none; z-index: 2; }
        .side-actions { position: absolute; right: 15px; bottom: 100px; z-index: 100; display: flex; flex-direction: column; gap: 20px; }
        .btn-action { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,0,60,0.5); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s; }
        .btn-action:active { transform: scale(0.9); border-color: var(--neon); }
        .btn-action i { font-size: 1.2rem; }
        .btn-action span { font-size: 10px; margin-top: 2px; }
        .upload-zone { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; align-items: center; gap: 10px; }
        .upload-btn { background: var(--neon); color: #fff; padding: 12px 24px; font-weight: bold; font-size: 12px; cursor: pointer; border: none; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%); box-shadow: 0 0 15px rgba(255,0,60,0.4); }
        .info-box { position: absolute; bottom: 40px; left: 20px; right: 80px; z-index: 10; pointer-events: none; }
        .glitch-title { font-family: 'Syncopate'; font-size: 1.8rem; text-transform: uppercase; color: #fff; line-height: 1; margin-bottom: 5px; }
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-container { width: 200px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 10px; position: relative; }
        .progress-bar { position: absolute; left: 0; top: 0; height: 100%; background: var(--neon); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="text-red-600 text-xs tracking-[5px] animate-pulse">CONNECTING_TO_CORE</div>
    <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
</div>

<div class="upload-zone">
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">[ UPLOAD_VK_NODE ]</button>
    <input type="file" id="fileInput" hidden accept="video/*">
    <div id="up-status" class="text-[10px] text-red-600 font-bold hidden">SYNCING...</div>
</div>

<header class="fixed top-5 right-5 z-[1000] text-right pointer-events-none">
    <div class="text-[9px] text-red-600 tracking-widest">ENCRYPTED STREAM</div>
    <div id="clock" class="text-lg font-bold font-mono">00:00:00</div>
</header>

<main class="viewport" id="feed"></main>

<script>
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dfscughol/video/upload";
    const CLOUDINARY_PRESET = "ml_default"; 

    const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ADS = [
        "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
        "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
    ];

    function triggerAd() {
        window.open(ADS[Math.floor(Math.random() * ADS.length)], '_blank');
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const upStatus = document.getElementById('up-status');
        upStatus.classList.remove('hidden');
        
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_PRESET);
        formData.append('folder', 'update_vk');

        try {
            const response = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
            const data = await response.json();
            
            if (data.secure_url) {
                await db.ref('network_vids').push({
                    url: data.secure_url,
                    timestamp: Date.now(),
                    node_id: "VK_" + Math.random().toString(36).substr(2, 9).toUpperCase()
                });
                upStatus.innerText = "DONE";
                setTimeout(() => upStatus.classList.add('hidden'), 2000);
            }
        } catch (error) {
            console.error("SYS_CRITICAL_ERR:", error);
            upStatus.innerText = "FAILED";
        }
    });

    db.ref('network_vids').orderByChild('timestamp').on('value', (snapshot) => {
        const feed = document.getElementById('feed');
        const pBar = document.getElementById('p-bar');
        feed.innerHTML = '';
        let count = 0;
        
        snapshot.forEach((child) => {
            const data = child.val();
            const section = document.createElement('section');
            section.className = 'card';
            section.innerHTML = `
                <div class="overlay"></div>
                <video loop playsinline muted src="${data.url}"></video>
                <div class="side-actions">
                    <div class="btn-action" onclick="triggerAd()"><i class="fas fa-heart text-red-600"></i><span>${Math.floor(Math.random()*999)}</span></div>
                    <div class="btn-action" onclick="triggerAd()"><i class="fas fa-comment"></i><span>${Math.floor(Math.random()*50)}</span></div>
                    <div class="btn-action" onclick="triggerAd()"><i class="fas fa-share"></i><span>ADS</span></div>
                </div>
                <div class="info-box">
                    <div class="text-[10px] text-red-500 mb-1">DATA_STREAM // ${data.node_id}</div>
                    <h2 class="glitch-title">SHΔDØW_CORE</h2>
                    <p class="text-white/40 text-[9px] uppercase tracking-widest">Protocol: Update_VK // Secure_Cloud</p>
                </div>
            `;
            feed.prepend(section);
            count++;
        });

        pBar.style.width = '100%';
        setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1000);
        initVideoLogic();
    });

    function initVideoLogic() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const vid = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    vid.play().catch(() => {});
                } else {
                    vid.pause();
                }
            });
        }, { threshold: 0.7 });

        document.querySelectorAll('.card').forEach(card => observer.observe(card));
    }

    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0') + ":" + 
                                                   d.getMinutes().toString().padStart(2,'0') + ":" + 
                                                   d.getSeconds().toString().padStart(2,'0');
    }, 1000);

    window.addEventListener('click', () => {
        document.querySelectorAll('video').forEach(v => v.muted = false);
    }, { once: true });
</script>
</body>
</html>
