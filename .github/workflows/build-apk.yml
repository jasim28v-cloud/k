name: 🃏 Build APK - Any Website

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '✏️ اسم التطبيق'
        required: true
        default: 'My App'
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.myapp.name)'
        required: true
        default: 'com.myapp.name'
        type: string
      website_url:
        description: '🌐 رابط الموقع (مثال: https://mysite.com)'
        required: true
        default: 'https://example.com'
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 Build ${{ github.event.inputs.app_name }} APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Capacitor + Tools
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update && sudo apt-get install -y imagemagick

      - name: 📁 Create WebView App
        run: |
          mkdir -p www
          
          # إنشاء صفحة WebView بسيطة تحمل الموقع
          cat > www/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>${{ github.event.inputs.app_name }}</title>
              <style>
                  *{margin:0;padding:0;box-sizing:border-box}
                  body,html{width:100%;height:100%;overflow:hidden;background:#000}
                  #loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f0a08;z-index:9999;flex-direction:column;gap:12px}
                  .spinner{width:40px;height:40px;border:3px solid rgba(234,88,12,0.2);border-top-color:#ea580c;border-radius:50%;animation:spin 0.8s linear infinite}
                  @keyframes spin{to{transform:rotate(360deg)}}
                  #loader p{color:#fff;font-family:sans-serif;font-size:14px}
                  iframe{width:100%;height:100%;border:none;display:none}
              </style>
          </head>
          <body>
              <div id="loader">
                  <div class="spinner"></div>
                  <p>${{ github.event.inputs.app_name }}</p>
              </div>
              <iframe id="webview" src="${{ github.event.inputs.website_url }}" allow="camera;microphone;geolocation;autoplay;encrypted-media;picture-in-picture" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads"></iframe>
              <script>
                  document.getElementById('webview').onload = function() {
                      document.getElementById('loader').style.display = 'none';
                      this.style.display = 'block';
                  };
                  setTimeout(function() {
                      document.getElementById('loader').style.display = 'none';
                      document.getElementById('webview').style.display = 'block';
                  }, 8000);
              </script>
          </body>
          </html>
          EOF
          
          echo "✅ WebView App created!"

      - name: 📄 Create package.json
        run: |
          cat > package.json << EOF
          {
            "name": "${{ github.event.inputs.app_name }}-app",
            "version": "1.0.0",
            "description": "${{ github.event.inputs.app_name }}",
            "main": "www/index.html",
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF

      - name: ⚙️ Create capacitor.config.json
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "server": { 
              "androidScheme": "https",
              "allowNavigation": ["*"],
              "hostname": "localhost"
            },
            "android": { 
              "allowMixedContent": true,
              "webContentsDebuggingEnabled": false
            }
          }
          EOF

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🤖 Add Android Platform
        run: npx cap add android

      - name: 🖼️ Generate App Icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          
          # ✅ إذا فيه صورة → استخدمها
          if [ -f "icon-512.png" ]; then
            echo "🖼️ استخدام الصورة المخصصة icon-512.png"
            convert icon-512.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert icon-512.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert icon-512.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert icon-512.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert icon-512.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "✅ PNG Icon Ready!"
          else
            # ❌ استخدم حرف أول من الاسم
            echo "🔤 لا توجد صورة - استخدام الحرف الأول"
            APP_LETTER=$(echo "${{ github.event.inputs.app_name }}" | cut -c1)
            
            cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF2
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#ea580c"/>
          </shape>
          EOF2
            
            cat > android/app/src/main/res/drawable/ic_launcher_foreground.xml << EOF3
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp">
              <text
                  android:text="${APP_LETTER}"
                  android:textSize="65dp"
                  android:textColor="#FFFFFF"
                  android:fontFamily="sans-serif-black"
                  android:gravity="center"
                  android:x="54dp"
                  android:y="72dp"/>
          </vector>
          EOF3
            
            cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF4'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF4
            echo "✅ Letter Icon Ready!"
          fi

      - name: 🎨 Configure Android
        run: |
          mkdir -p android/app/src/main/res/values
          
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
              <string name="title_activity_main">${{ github.event.inputs.app_name }}</string>
          </resources>
          EOF

      - name: 🔄 Sync Assets
        run: npx cap sync android

      - name: 🔨 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
