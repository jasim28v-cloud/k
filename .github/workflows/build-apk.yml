name: 🃏 Build APK - Joker (Any Project)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'MyApp'
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.example.myapp)'
        required: true
        default: 'com.example.myapp'
        type: string
      icon_path:
        description: '🖼️ مسار الأيقونة مع الاسم (مثال: icons/myicon.png)'
        required: true
        default: 'icons/icon.png'
        type: string
      icon_bg_color:
        description: '🎨 لون خلفية الأيقونة (مثال: #FFFFFF)'
        required: false
        default: '#FFFFFF'
        type: string
      app_color:
        description: '🎨 لون التطبيق الاحتياطي (عند عدم وجود الصورة)'
        required: false
        default: '#2196F3'
        type: string
      app_letter:
        description: '🔤 حرف الأيقونة الاحتياطي (عند عدم وجود الصورة)'
        required: false
        default: 'A'
        type: string
      app_version:
        description: '📌 إصدار التطبيق'
        required: false
        default: '1.0.0'
        type: string
      app_version_code:
        description: '🔢 رمز الإصدار (رقم صحيح)'
        required: false
        default: '1'
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick

      - name: Prepare App Content
        run: |
          mkdir -p www
          
          cp *.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp *.json www/ 2>/dev/null || true
          cp *.svg www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true
          cp *.jpg www/ 2>/dev/null || true
          cp *.jpeg www/ 2>/dev/null || true
          cp *.webp www/ 2>/dev/null || true
          
          if [ ! -f www/index.html ]; then
            echo '<html><body><h1>App Ready</h1></body></html>' > www/index.html
          fi

      - name: Create package.json
        run: |
          echo '{"name":"app","version":"1.0.0","main":"www/index.html","dependencies":{"@capacitor/android":"^6.0.0","@capacitor/core":"^6.0.0","@capacitor/cli":"^6.0.0"}}' > package.json

      - name: Create capacitor.config.json
        env:
          APP_ID: ${{ github.event.inputs.app_id }}
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          echo "{\"appId\":\"${APP_ID}\",\"appName\":\"${APP_NAME}\",\"webDir\":\"www\",\"server\":{\"androidScheme\":\"https\"},\"android\":{\"allowMixedContent\":true}}" > capacitor.config.json

      - name: Install Dependencies
        run: npm install

      - name: Add Android Platform
        run: npx cap add android

      - name: Generate App Icons
        env:
          ICON_PATH: ${{ github.event.inputs.icon_path }}
          BG_COLOR: ${{ github.event.inputs.icon_bg_color }}
          APP_COLOR: ${{ github.event.inputs.app_color }}
          APP_LETTER: ${{ github.event.inputs.app_letter }}
        run: |
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/values
          
          if [ -f "${ICON_PATH}" ]; then
            echo "Found icon"
            convert "${ICON_PATH}" -resize 432x432^ -gravity center -extent 432x432 -alpha set android/app/src/main/res/drawable/ic_launcher_foreground.png
            convert "${ICON_PATH}" -resize 48x48 -gravity center -extent 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert "${ICON_PATH}" -resize 72x72 -gravity center -extent 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert "${ICON_PATH}" -resize 96x96 -gravity center -extent 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert "${ICON_PATH}" -resize 144x144 -gravity center -extent 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert "${ICON_PATH}" -resize 192x192 -gravity center -extent 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          else
            echo "Generating default icon"
            convert -size 1024x1024 xc:"${APP_COLOR}" -gravity center -fill white -font Helvetica-Bold -pointsize 500 -annotate 0 "${APP_LETTER}" android/app/src/main/res/drawable/ic_launcher_foreground.png
            convert -size 1024x1024 xc:"${APP_COLOR}" -gravity center -fill white -font Helvetica-Bold -pointsize 500 -annotate 0 "${APP_LETTER}" -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert -size 1024x1024 xc:"${APP_COLOR}" -gravity center -fill white -font Helvetica-Bold -pointsize 500 -annotate 0 "${APP_LETTER}" -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert -size 1024x1024 xc:"${APP_COLOR}" -gravity center -fill white -font Helvetica-Bold -pointsize 500 -annotate 0 "${APP_LETTER}" -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert -size 1024x1024 xc:"${APP_COLOR}" -gravity center -fill white -font Helvetica-Bold -pointsize 500 -annotate 0 "${APP_LETTER}" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert -size 1024x1024 xc:"${APP_COLOR}" -gravity center -fill white -font Helvetica-Bold -pointsize 500 -annotate 0 "${APP_LETTER}" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          fi
          
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/drawable/ic_launcher.png
          
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><vector xmlns:android=\"http://schemas.android.com/apk/res/android\" android:width=\"108dp\" android:height=\"108dp\" android:viewportWidth=\"108\" android:viewportHeight=\"108\"><path android:fillColor=\"${BG_COLOR}\" android:pathData=\"M0,0h108v108h-108z\"/></vector>" > android/app/src/main/res/drawable/ic_launcher_background.xml
          
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\"><background android:drawable=\"@drawable/ic_launcher_background\"/><foreground android:drawable=\"@drawable/ic_launcher_foreground\"/></adaptive-icon>" > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\"><background android:drawable=\"@drawable/ic_launcher_background\"/><foreground android:drawable=\"@drawable/ic_launcher_foreground\"/></adaptive-icon>" > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources><color name=\"ic_launcher_background\">${BG_COLOR}</color></resources>" > android/app/src/main/res/values/ic_launcher_background.xml

      - name: Customize App Configuration
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          APP_ID: ${{ github.event.inputs.app_id }}
          VERSION_CODE: ${{ github.event.inputs.app_version_code }}
          VERSION_NAME: ${{ github.event.inputs.app_version }}
        run: |
          echo "<?xml version='1.0' encoding='utf-8'?><resources><string name=\"app_name\">${APP_NAME}</string><string name=\"title_activity_main\">${APP_NAME}</string></resources>" > android/app/src/main/res/values/strings.xml
          
          echo "apply plugin: 'com.android.application'
          android {
              namespace '${APP_ID}'
              compileSdkVersion 34
              defaultConfig {
                  applicationId '${APP_ID}'
                  minSdkVersion 22
                  targetSdkVersion 34
                  versionCode ${VERSION_CODE}
                  versionName '${VERSION_NAME}'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }" > android/app/build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
