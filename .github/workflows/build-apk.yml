name: 🃏 Build APK - Joker

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'جوكر'
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.joker.app)'
        required: true
        default: 'com.joker.app'
        type: string
      icon_file:
        description: '🖼️ اسم ملف الأيقونة PNG (ضع الملف في المستودع)'
        required: false
        default: 'icon.png'
        type: string
      app_color:
        description: '🎨 لون خلفية احتياطي'
        required: false
        default: '#FF0000'
        type: string
      app_letter:
        description: '🔤 حرف احتياطي'
        required: false
        default: 'ج'
        type: string
      site_folder:
        description: '📁 مجلد الموقع (اتركه فارغاً للجذر)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 بناء ${{ github.event.inputs.app_name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل المشروع
        uses: actions/checkout@v4

      - name: ☕ تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 تثبيت Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت الأدوات
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick

      - name: 📁 تجهيز www
        run: |
          mkdir -p www
          SRC="${{ github.event.inputs.site_folder }}"
          [ -z "$SRC" ] && SRC="."
          cp -r $SRC/* www/ 2>/dev/null || true
          rm -rf www/.git www/.github www/node_modules 2>/dev/null || true
          echo "✅ www جاهز"

      - name: ⚙️ إعداد Capacitor
        run: |
          cat > package.json << EOF
          {
            "name": "${{ github.event.inputs.app_name }}",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF
          
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "server": { "androidScheme": "https" },
            "android": { "allowMixedContent": true }
          }
          EOF
          
          npm install
          npx cap add android

      - name: 🎨 الأيقونة
        run: |
          ICON="${{ github.event.inputs.icon_file }}"
          COLOR="${{ github.event.inputs.app_color }}"
          LETTER="${{ github.event.inputs.app_letter }}"
          
          # إنشاء المجلدات
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/values
          
          # إنشاء foreground (صورة PNG مباشرة)
          if [ -f "$ICON" ]; then
            echo "✅ استخدام الصورة: $ICON"
            convert "$ICON" -resize 432x432^ -gravity center -extent 432x432 \
              android/app/src/main/res/drawable/ic_launcher_foreground.png
          else
            echo "⚠️ $ICON غير موجود، استخدام حرف"
            convert -size 432x432 xc:"$COLOR" -gravity center \
              -fill white -font Helvetica -pointsize 200 \
              -annotate 0 "$LETTER" \
              android/app/src/main/res/drawable/ic_launcher_foreground.png
          fi
          
          # أحجام mipmap
          for size in 48 72 96 144 192; do
            case $size in
              48) d=mdpi; p=24;;
              72) d=hdpi; p=36;;
              96) d=xhdpi; p=48;;
              144) d=xxhdpi; p=72;;
              192) d=xxxhdpi; p=96;;
            esac
            if [ -f "$ICON" ]; then
              convert "$ICON" -resize ${size}x${size} -gravity center -extent ${size}x${size} \
                android/app/src/main/res/mipmap-${d}/ic_launcher.png
            else
              convert -size ${size}x${size} xc:"$COLOR" -gravity center \
                -fill white -font Helvetica -pointsize $p \
                -annotate 0 "$LETTER" \
                android/app/src/main/res/mipmap-${d}/ic_launcher.png
            fi
          done
          
          # خلفية الأيقونة
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#FFFFFF" android:pathData="M0,0h108v108h-108z"/>
          </vector>
          EOF
          
          # الأيقونة التكيفية
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          echo "✅ الأيقونة جاهزة"

      - name: 📝 اسم التطبيق
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
          </resources>
          EOF

      - name: 🔄 مزامنة
        run: npx cap sync android

      - name: 🔨 بناء APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
