name: 🃏 Build APK - Joker (All Sites)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'FLARE'
        type: choice
        options:
          - 'LEGACY'
          - 'VIOLET'
          - 'GREEN'
          - 'FLARE'
      app_id:
        description: '🆔 App ID'
        required: true
        default: 'com.flare.orange'
        type: choice
        options:
          - 'com.legacy.gold'
          - 'com.violet.purple'
          - 'com.green.emerald'
          - 'com.flare.orange'
      app_color:
        description: '🎨 لون الخلفية (يُستخدم عند توليد الأيقونة)'
        required: true
        default: '#ea580c'
        type: choice
        options:
          - '#d4a843'
          - '#7c3aed'
          - '#059669'
          - '#ea580c'
      app_letter:
        description: '🔤 حرف الأيقونة (يُستخدم عند توليد الأيقونة)'
        required: true
        default: 'F'
        type: choice
        options:
          - 'L'
          - 'V'
          - 'G'
          - 'F'
      icon_source:
        description: '🖼️ مصدر الأيقونة'
        required: true
        default: 'generate'
        type: choice
        options:
          - 'generate'
          - 'icons/legacy.png'
          - 'icons/violet.png'
          - 'icons/green.png'
          - 'icons/flare.png'

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 Build ${{ github.event.inputs.app_name }} APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # للتمكن من commit لاحقاً

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Capacitor
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: 📁 Create www folder
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.json www/ 2>/dev/null || true
          cp *.svg www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true

      - name: 📄 Create package.json
        run: |
          cat > package.json << EOF
          {
            "name": "${{ github.event.inputs.app_name }}-app",
            "version": "1.0.0",
            "description": "${{ github.event.inputs.app_name }} - App",
            "main": "www/index.html",
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF

      - name: ⚙️ Create capacitor.config.json
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "server": { "androidScheme": "https" },
            "android": { "allowMixedContent": true }
          }
          EOF

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🤖 Add Android Platform
        run: npx cap add android

      - name: 🎨 Generate or Copy Icon
        id: icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/values
          mkdir -p icons

          ICON_SOURCE="${{ github.event.inputs.icon_source }}"
          APP_COLOR="${{ github.event.inputs.app_color }}"
          APP_LETTER="${{ github.event.inputs.app_letter }}"

          if [[ "$ICON_SOURCE" == "generate" ]]; then
            sudo apt-get update -qq && sudo apt-get install -y imagemagick
            convert -size 1024x1024 xc:"$APP_COLOR" -gravity center -fill white \
              -font Helvetica -pointsize 500 -annotate 0 "$APP_LETTER" \
              android/app/src/main/res/drawable/ic_launcher_foreground.png
            echo "✅ Generated icon with letter $APP_LETTER on $APP_COLOR"
          else
            if [ -f "$ICON_SOURCE" ]; then
              cp "$ICON_SOURCE" android/app/src/main/res/drawable/ic_launcher_foreground.png
              echo "✅ Copied custom icon from $ICON_SOURCE"
            else
              echo "⚠️ Custom icon not found, generating default"
              sudo apt-get update -qq && sudo apt-get install -y imagemagick
              convert -size 1024x1024 xc:"$APP_COLOR" -gravity center -fill white \
                -font Helvetica -pointsize 500 -annotate 0 "$APP_LETTER" \
                android/app/src/main/res/drawable/ic_launcher_foreground.png
            fi
          fi

          # حفظ نسخة في مجلد icons/ لرفعها للمستودع
          cp android/app/src/main/res/drawable/ic_launcher_foreground.png icons/${{ github.event.inputs.app_name }}.png
          echo "💾 Saved icon to icons/${{ github.event.inputs.app_name }}.png"

          # خلفية بيضاء للأيقونة التكيفية
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#FFFFFF"/>
          </shape>
          EOF

          # ملف الأيقونة التكيفية
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          # مورد اللون للخلفية (اختياري)
          cat > android/app/src/main/res/values/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#FFFFFF</color>
          </resources>
          EOF

      - name: 🚀 Upload icon to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🏷️ Add/Update icon for ${{ github.event.inputs.app_name }}"
          file_pattern: icons/*
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: 🎨 Customize Android Strings
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
              <string name="title_activity_main">${{ github.event.inputs.app_name }}</string>
          </resources>
          EOF

      - name: 🔄 Sync Assets
        run: npx cap sync android

      - name: 🔨 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
