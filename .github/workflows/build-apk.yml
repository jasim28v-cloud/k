name: 🃏 Build APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '✏️ اسم التطبيق'
        required: true
        default: 'My App'
        type: string
      app_id:
        description: '🆔 App ID'
        required: true
        default: 'com.myapp.name'
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - run: |
          mkdir -p www
          cp -r *.html www/ 2>/dev/null || true
          cp -r *.js www/ 2>/dev/null || true
          cp -r *.css www/ 2>/dev/null || true
          cp -r *.json www/ 2>/dev/null || true

      - run: |
          cat > package.json << EOF
          {"name":"app","version":"1.0.0","main":"www/index.html","dependencies":{"@capacitor/android":"^6.0.0","@capacitor/core":"^6.0.0","@capacitor/cli":"^6.0.0"}}
          EOF

      - run: |
          cat > capacitor.config.json << EOF
          {"appId":"${{ github.event.inputs.app_id }}","appName":"${{ github.event.inputs.app_name }}","webDir":"www","server":{"androidScheme":"https"},"android":{"allowMixedContent":true}}
          EOF

      - run: npm install
      - run: npx cap add android

      - name: 🎨 Icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          L=$(echo "${{ github.event.inputs.app_name }}" | cut -c1)
          echo '<shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#ea580c"/></shape>' > android/app/src/main/res/drawable/ic_launcher_background.xml
          echo '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp"><text android:text="'$L'" android:textSize="65dp" android:textColor="#FFFFFF" android:fontFamily="sans-serif-black" android:gravity="center" android:x="54dp" android:y="72dp"/></vector>' > android/app/src/main/res/drawable/ic_launcher_foreground.xml
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@drawable/ic_launcher_background"/><foreground android:drawable="@drawable/ic_launcher_foreground"/></adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml

      - run: |
          mkdir -p android/app/src/main/res/values
          echo '<resources><string name="app_name">${{ github.event.inputs.app_name }}</string></resources>' > android/app/src/main/res/values/strings.xml

      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
