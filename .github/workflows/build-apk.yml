name: 📱 Build SIMRK APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: 🚀 Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: 🔨 Build APK
        run: |
          cd android-project
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: 📦 Sign APK
        run: |
          APK_UNSIGNED="android-project/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_SIGNED="SIMRK-Release.apk"
          
          keytool -genkey -v \
            -keystore release-key.jks \
            -alias simrk \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass simrk2026 \
            -keypass simrk2026 \
            -dname "CN=SIMRK, OU=App, O=SIMRK, L=World"
          
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks release-key.jks \
            --ks-pass pass:simrk2026 \
            --out $APK_SIGNED \
            $APK_UNSIGNED
            
      - name: 📤 Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "SIMRK-Release.apk"
          name: "💙 SIMRK v${{ github.ref_name }}"
          body: |
            ## 💙 SIMRK - Blue Ultra Edition
            
            ### 📱 تطبيق أندرويد حقيقي - جميع الملفات داخل الـ APK
            ### يسلم عليك jasim28v@gmail.com 💙
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
