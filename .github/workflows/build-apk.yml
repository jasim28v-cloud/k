- name: 🎨 Set App Icon
  id: icon
  run: |
    mkdir -p android/app/src/main/res/drawable
    mkdir -p android/app/src/main/res/mipmap-anydpi-v26
    mkdir -p android/app/src/main/res/values
    mkdir -p android/app/src/main/res/mipmap-hdpi
    mkdir -p android/app/src/main/res/mipmap-mdpi
    mkdir -p android/app/src/main/res/mipmap-xhdpi
    mkdir -p android/app/src/main/res/mipmap-xxhdpi
    mkdir -p android/app/src/main/res/mipmap-xxxhdpi

    APP_NAME="${{ github.event.inputs.app_name }}"
    APP_COLOR="${{ github.event.inputs.app_color }}"
    APP_LETTER="${{ github.event.inputs.app_letter }}"
    ICON_PATH="${{ github.event.inputs.icon_path }}"

    # تثبيت ImageMagick
    sudo apt-get update -qq && sudo apt-get install -y imagemagick

    if [ -f "$ICON_PATH" ]; then
      echo "✅ تم العثور على الأيقونة: $ICON_PATH"
      
      # تحويل الصورة للأحجام المطلوبة للأيقونات التكيفية
      convert "$ICON_PATH" -resize 1024x1024 -gravity center -extent 1024x1024 \
        android/app/src/main/res/drawable/ic_launcher_foreground.png
      
      # إنشاء الأيقونات بأحجام مختلفة للـ mipmap
      convert "$ICON_PATH" -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
      convert "$ICON_PATH" -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
      convert "$ICON_PATH" -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
      convert "$ICON_PATH" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
      convert "$ICON_PATH" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      
      echo "✅ تم تحويل الأيقونة لجميع الأحجام"
      
    else
      echo "⚠️ الأيقونة $ICON_PATH غير موجودة، جاري توليد أيقونة افتراضية..."
      
      # توليد أيقونة بالحرف واللون
      convert -size 1024x1024 xc:"$APP_COLOR" -gravity center -fill white \
        -font Helvetica -pointsize 500 -annotate 0 "$APP_LETTER" \
        android/app/src/main/res/drawable/ic_launcher_foreground.png
      
      # توليد بأحجام مختلفة
      convert -size 48x48 xc:"$APP_COLOR" -gravity center -fill white \
        -font Helvetica -pointsize 25 -annotate 0 "$APP_LETTER" \
        android/app/src/main/res/mipmap-mdpi/ic_launcher.png
      convert -size 72x72 xc:"$APP_COLOR" -gravity center -fill white \
        -font Helvetica -pointsize 35 -annotate 0 "$APP_LETTER" \
        android/app/src/main/res/mipmap-hdpi/ic_launcher.png
      convert -size 96x96 xc:"$APP_COLOR" -gravity center -fill white \
        -font Helvetica -pointsize 45 -annotate 0 "$APP_LETTER" \
        android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
      convert -size 144x144 xc:"$APP_COLOR" -gravity center -fill white \
        -font Helvetica -pointsize 70 -annotate 0 "$APP_LETTER" \
        android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
      convert -size 192x192 xc:"$APP_COLOR" -gravity center -fill white \
        -font Helvetica -pointsize 95 -annotate 0 "$APP_LETTER" \
        android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      
      echo "✅ تم توليد أيقونة بالحرف $APP_LETTER ولون $APP_COLOR"
    fi

    # إنشاء الخلفية البيضاء للأيقونة التكيفية
    cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
    <?xml version="1.0" encoding="utf-8"?>
    <shape xmlns:android="http://schemas.android.com/apk/res/android">
        <solid android:color="#FFFFFF"/>
    </shape>
    EOF

    # ملف الأيقونة التكيفية
    cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
    <?xml version="1.0" encoding="utf-8"?>
    <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
        <background android:drawable="@drawable/ic_launcher_background"/>
        <foreground android:drawable="@drawable/ic_launcher_foreground"/>
    </adaptive-icon>
    EOF

    cat > android/app/src/main/res/values/ic_launcher_background.xml << EOF
    <?xml version="1.0" encoding="utf-8"?>
    <resources>
        <color name="ic_launcher_background">#FFFFFF</color>
    </resources>
    EOF

    echo "✅ أيقونة $APP_NAME جاهزة بجميع الأحجام!"
