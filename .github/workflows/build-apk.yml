name: 🃏 Build APK - Joker

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        type: string
      app_id:
        description: '🆔 App ID'
        required: true
        type: string
      icon_path:
        description: '🖼️ مسار الأيقونة'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update -qq && sudo apt-get install -y imagemagick

      - name: Prepare www
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true
          cp *.svg www/ 2>/dev/null || true
          cp *.json www/ 2>/dev/null || true

      - name: Create package.json
        run: |
          echo '{"name":"app","version":"1.0.0","main":"www/index.html","dependencies":{"@capacitor/android":"^6.0.0","@capacitor/core":"^6.0.0","@capacitor/cli":"^6.0.0"}}' > package.json

      - name: Create capacitor.config.json
        run: |
          echo '{"appId":"${{ github.event.inputs.app_id }}","appName":"${{ github.event.inputs.app_name }}","webDir":"www","server":{"androidScheme":"https"},"android":{"allowMixedContent":true}}' > capacitor.config.json

      - run: npm install
      - run: npx cap add android

      - name: 🎨 Set Icon (ALL IN ONE)
        run: |
          # مجلدات
          mkdir -p android/app/src/main/res/{drawable,mipmap-anydpi-v26,values}
          mkdir -p android/app/src/main/res/mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}

          ICON="${{ github.event.inputs.icon_path }}"

          if [ -f "$ICON" ]; then
            # 1. Foreground من صورتك
            convert "$ICON" -resize 432x432^ -gravity center -extent 432x432 \
              android/app/src/main/res/drawable/ic_launcher_foreground.png

            # 2. أيقونات احتياطية للأجهزة القديمة
            for size in 48 72 96 144 192; do
              case $size in
                48) folder=mdpi;;
                72) folder=hdpi;;
                96) folder=xhdpi;;
                144) folder=xxhdpi;;
                192) folder=xxxhdpi;;
              esac
              convert "$ICON" -resize ${size}x${size} android/app/src/main/res/mipmap-${folder}/ic_launcher.png
            done

            # 3. خلفية بيضاء
            cat > android/app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#FFFFFF" android:pathData="M0,0h108v108h-108z"/>
          </vector>
          EOF

            # 4. الأيقونة التكيفية
            cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

            echo "✅ Done!"
          else
            echo "❌ $ICON not found!"
            ls *.png 2>/dev/null || echo "No PNG files"
            exit 1
          fi

      - name: App Name
        run: |
          mkdir -p android/app/src/main/res/values
          echo '<resources><string name="app_name">${{ github.event.inputs.app_name }}</string></resources>' > android/app/src/main/res/values/strings.xml

      - run: npx cap sync android

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
