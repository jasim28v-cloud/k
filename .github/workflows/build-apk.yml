name: 🃏 Build APK - Joker

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'جوكر'
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.joker.app)'
        required: true
        default: 'com.joker.app'
        type: string
      app_color:
        description: '🎨 لون خلفية الأيقونة (مثال: #FF0000)'
        required: true
        default: '#FF0000'
        type: string
      icon_file:
        description: '🖼️ اسم ملف الأيقونة PNG (ضع الملف في مجلد المشروع)'
        required: true
        default: 'icon.png'
        type: string
      site_folder:
        description: '📁 مجلد موقع الويب (اتركه فارغاً للمجلد الرئيسي)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 بناء تطبيق ${{ github.event.inputs.app_name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل المشروع بالكامل
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 تثبيت Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت Capacitor والأدوات
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update
          sudo apt-get install -y imagemagick tree

      - name: 📁 سحب وتجهيز جميع ملفات الموقع
        run: |
          echo "🔍 بدء عملية سحب الملفات..."
          
          # عرض هيكل المشروع قبل التجهيز
          echo "📋 هيكل المشروع الحالي:"
          tree -L 3 -I 'node_modules|.git|.github|android|ios' || ls -R
          
          # إنشاء مجلد www نظيف
          rm -rf www
          mkdir -p www
          
          # تحديد مجلد المصدر
          SOURCE_DIR="${{ github.event.inputs.site_folder }}"
          if [ -z "$SOURCE_DIR" ]; then
            SOURCE_DIR="."
          fi
          
          echo "📁 المصدر: $SOURCE_DIR"
          
          # نسخ جميع الملفات بطريقة صحيحة
          cd "$SOURCE_DIR"
          
          # نسخ كل الملفات ما عدا المستثناة
          find . -type f \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -not -path './node_modules/*' \
            -not -path './android/*' \
            -not -path './ios/*' \
            -not -path './www/*' \
            -not -name 'package.json' \
            -not -name 'package-lock.json' \
            -not -name 'capacitor.config.json' \
            -not -name "${{ github.event.inputs.icon_file }}" \
            | while read file; do
              # إنشاء المجلد الهدف
              target_dir="../www/$(dirname "$file")"
              mkdir -p "$target_dir"
              # نسخ الملف
              cp "$file" "$target_dir/"
              echo "  ✅ نسخ: $file"
            done
          
          cd ..
          
          # نسخ المجلدات الفارغة إذا وجدت
          find "$SOURCE_DIR" -type d -empty \
            -not -path '*/.git/*' \
            -not -path '*/node_modules/*' \
            | while read dir; do
              target_dir="www/${dir#$SOURCE_DIR/}"
              mkdir -p "$target_dir"
              echo "  📁 مجلد فارغ: $target_dir"
            done
          
          echo ""
          echo "✅ تم الانتهاء من نسخ الملفات"
          echo ""
          echo "📊 إحصائيات مجلد www:"
          echo "  📁 عدد الملفات: $(find www -type f | wc -l)"
          echo "  📂 عدد المجلدات: $(find www -type d | wc -l)"
          echo "  💾 الحجم الإجمالي: $(du -sh www | cut -f1)"
          echo ""
          echo "📋 هيكل مجلد www:"
          tree www -L 3 || find www -type f | sort

      - name: 🔍 التحقق من الملفات الأساسية
        run: |
          echo "🔍 التحقق من وجود index.html..."
          
          # البحث عن index.html
          if [ -f "www/index.html" ]; then
            echo "✅ index.html موجود في: www/index.html"
            echo "📄 المحتوى:"
            head -n 20 www/index.html
          elif [ -f "www/index.htm" ]; then
            echo "✅ index.htm موجود"
            # إعادة تسميته
            mv www/index.htm www/index.html
            echo "  تم تحويله إلى index.html"
          else
            echo "❌ لم يتم العثور على index.html!"
            echo "🔍 البحث عن ملفات HTML..."
            find www -name "*.html" -o -name "*.htm" | head -n 10
            
            # إنشاء index.html افتراضي إذا لم يوجد
            FIRST_HTML=$(find www -name "*.html" -o -name "*.htm" | head -n 1)
            if [ -n "$FIRST_HTML" ]; then
              echo "⚠️ استخدام أول ملف HTML: $FIRST_HTML"
              cp "$FIRST_HTML" www/index.html
            else
              echo "⚠️ إنشاء index.html افتراضي"
              cat > www/index.html << 'EOF'
          <!DOCTYPE html>
          <html dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>تطبيق ${{ github.event.inputs.app_name }}</title>
              <style>
                  body {
                      margin: 0;
                      padding: 20px;
                      font-family: Arial, sans-serif;
                      background: linear-gradient(135deg, ${{ github.event.inputs.app_color }}, #333);
                      color: white;
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      text-align: center;
                  }
                  h1 { font-size: 3em; margin: 0; }
                  p { font-size: 1.2em; opacity: 0.8; }
              </style>
          </head>
          <body>
              <div>
                  <h1>🎉 ${{ github.event.inputs.app_name }}</h1>
                  <p>تم بناء التطبيق بنجاح</p>
                  <p>يمكنك الآن إضافة ملفات موقعك</p>
              </div>
          </body>
          </html>
          EOF
            fi
          fi

      - name: 📄 إنشاء package.json
        run: |
          cat > package.json << EOF
          {
            "name": "${{ github.event.inputs.app_name }}",
            "version": "1.0.0",
            "description": "تطبيق ${{ github.event.inputs.app_name }}",
            "main": "www/index.html",
            "scripts": {
              "build": "echo 'Build complete'"
            },
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor/cli": "^6.0.0",
              "@capacitor/filesystem": "^6.0.0",
              "@capacitor/app": "^6.0.0",
              "@capacitor/status-bar": "^6.0.0",
              "@capacitor/splash-screen": "^6.0.0"
            }
          }
          EOF

      - name: ⚙️ إعداد Capacitor
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "allowNavigation": ["*"],
              "cleartext": true
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": true
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "${{ github.event.inputs.app_color }}"
              }
            }
          }
          EOF
          
          # عرض محتوى ملف الإعدادات للتأكد
          echo "📋 محتوى capacitor.config.json:"
          cat capacitor.config.json

      - name: 📦 تثبيت المكتبات
        run: npm install

      - name: 🤖 إنشاء مشروع Android
        run: npx cap add android

      - name: 🎨 إنشاء الأيقونات بجميع المقاسات
        run: |
          ICON_FILE="${{ github.event.inputs.icon_file }}"
          
          if [ ! -f "$ICON_FILE" ]; then
            echo "❌ ملف الأيقونة غير موجود: $ICON_FILE"
            echo "🔍 البحث عن ملفات الصور..."
            find . -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" | grep -v node_modules | grep -v android
            exit 1
          fi
          
          echo "✅ معالجة الأيقونة: $ICON_FILE"
          
          # حذف الأيقونات القديمة
          rm -rf android/app/src/main/res/mipmap-*
          rm -rf android/app/src/main/res/drawable/ic_launcher_*
          rm -rf android/app/src/main/res/drawable-*
          
          # إنشاء المجلدات
          for dir in mipmap-ldpi mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi mipmap-anydpi-v26 drawable; do
            mkdir -p "android/app/src/main/res/$dir"
          done
          
          # إنشاء الأيقونات بجميع المقاسات
          echo "🎨 إنشاء الأيقونات..."
          convert $ICON_FILE -resize 36x36   android/app/src/main/res/mipmap-ldpi/ic_launcher.png
          convert $ICON_FILE -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert $ICON_FILE -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert $ICON_FILE -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert $ICON_FILE -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert $ICON_FILE -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # نسخ للـ foreground
          cp $ICON_FILE android/app/src/main/res/drawable/ic_launcher_foreground.png
          
          echo "✅ تم إنشاء جميع الأيقونات"

      - name: 🎨 إنشاء الأيقونة التكيفية
        run: |
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="${{ github.event.inputs.app_color }}"/>
          </shape>
          EOF
          
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

      - name: 🎨 تخصيص تطبيق Android
        run: |
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
              <string name="title_activity_main">${{ github.event.inputs.app_name }}</string>
          </resources>
          EOF
          
          cat > android/app/src/main/res/values/styles.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">${{ github.event.inputs.app_color }}</item>
                  <item name="colorPrimaryDark">${{ github.event.inputs.app_color }}</item>
                  <item name="colorAccent">${{ github.event.inputs.app_color }}</item>
              </style>
          </resources>
          EOF

      - name: 🔧 إعداد أذونات Android
        run: |
          MANIFEST_FILE="android/app/src/main/AndroidManifest.xml"
          
          if [ -f "$MANIFEST_FILE" ]; then
            # إضافة إذن الإنترنت
            if ! grep -q "INTERNET" "$MANIFEST_FILE"; then
              sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET"/>\n</manifest>|' "$MANIFEST_FILE"
            fi
            
            # السماح بـ HTTP
            sed -i 's|android:usesCleartextTraffic="false"|android:usesCleartextTraffic="true"|' "$MANIFEST_FILE" || true
            
            if ! grep -q "usesCleartextTraffic" "$MANIFEST_FILE"; then
              sed -i 's|<application|<application android:usesCleartextTraffic="true"|' "$MANIFEST_FILE"
            fi
            
            echo "✅ محتوى AndroidManifest.xml:"
            cat "$MANIFEST_FILE"
          fi

      - name: 🔄 مزامنة المشروع مع التأكيد
        run: |
          echo "🔄 جاري مزامنة Capacitor..."
          npx cap sync android
          
          echo ""
          echo "📊 التأكد من وجود ملفات www في المشروع:"
          if [ -d "android/app/src/main/assets/public" ]; then
            echo "✅ مجلد assets/public موجود"
            echo "📁 عدد الملفات: $(find android/app/src/main/assets -type f | wc -l)"
          fi
          
          # عرض محتويات مجلد assets
          echo ""
          echo "📋 محتويات مجلد assets:"
          find android/app/src/main/assets -type f 2>/dev/null | head -n 30 || echo "  (مجلد assets فارغ أو غير موجود)"

      - name: 🔨 بناء تطبيق APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📊 التحقق من الـ APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          
          if [ -f "$APK_PATH" ]; then
            echo "✅ تم بناء APK بنجاح!"
            echo "📱 حجم APK: $(du -h $APK_PATH | cut -f1)"
            
            # فحص محتويات APK
            echo ""
            echo "📋 فحص محتويات APK..."
            unzip -l "$APK_PATH" | grep -E "assets|index.html" | head -n 20
            
            echo ""
            echo "📊 إحصائيات APK:"
            echo "  📁 إجمالي الملفات: $(unzip -l $APK_PATH | tail -1 | awk '{print $2}')"
          else
            echo "❌ فشل بناء APK!"
            exit 1
          fi

      - name: 📤 رفع ملف APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: 🎉 اكتمال البناء
        run: |
          echo "🎊 تم بناء تطبيق ${{ github.event.inputs.app_name }} بنجاح!"
          echo "📱 تم تضمين جميع ملفات موقعك داخل الـ APK"
          echo "✅ التطبيق جاهز للتحميل من قسم Artifacts"
