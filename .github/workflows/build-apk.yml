name: 🃏 Build APK - Working 100%

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.myapp.name)'
        required: true
        type: string
      app_color:
        description: '🎨 لون الأيقونة'
        required: true
        default: '#ea580c'
        type: string
      app_letter:
        description: '🔤 حرف الأيقونة'
        required: true
        default: 'F'
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 Build ${{ github.event.inputs.app_name }}
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick

      - name: Copy Files
        run: |
          mkdir -p www
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" -o -name "*.svg" -o -name "*.png" -o -name "*.jpg" \) -exec cp {} www/ \;
          ls -la www/

      - name: Package.json
        run: |
          echo '{"name":"app","version":"1.0.0","main":"www/index.html","dependencies":{"@capacitor/android":"^6.0.0","@capacitor/core":"^6.0.0","@capacitor/cli":"^6.0.0"}}' > package.json

      - name: Capacitor Config
        run: |
          echo "{\"appId\":\"${{ github.event.inputs.app_id }}\",\"appName\":\"${{ github.event.inputs.app_name }}\",\"webDir\":\"www\",\"server\":{\"androidScheme\":\"https\",\"allowNavigation\":[\"*\"]},\"android\":{\"allowMixedContent\":true}}" > capacitor.config.json

      - run: npm install
      - run: npx cap add android

      - name: Icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          
          if [ -f "icon-512.png" ] && file icon-512.png | grep -q "PNG"; then
            echo "🖼️ PNG Found!"
            convert icon-512.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            for d in hdpi:72 mdpi:48 xhdpi:96 xxhdpi:144; do
              folder=${d%:*}; size=${d#*:}
              mkdir -p android/app/src/main/res/mipmap-$folder
              convert icon-512.png -resize ${size}x${size} android/app/src/main/res/mipmap-$folder/ic_launcher.png
            done
          else
            echo "🔤 Letter: ${{ github.event.inputs.app_letter }}"
            cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="${{ github.event.inputs.app_color }}"/>
          </shape>
          EOF
            cat > android/app/src/main/res/drawable/ic_launcher_foreground.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp">
              <text android:text="${{ github.event.inputs.app_letter }}" android:textSize="65dp" android:textColor="#FFFFFF" android:fontFamily="sans-serif-black" android:gravity="center" android:x="54dp" android:y="72dp"/>
          </vector>
          EOF
            cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          fi
          echo "✅ Done!"

      - name: Strings
        run: |
          mkdir -p android/app/src/main/res/values
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources><string name=\"app_name\">${{ github.event.inputs.app_name }}</string></resources>" > android/app/src/main/res/values/strings.xml

      - run: npx cap sync android

      - name: Build
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
