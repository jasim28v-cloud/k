name: 🃏 Build APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        type: string
      app_id:
        description: '🆔 App ID'
        required: true
        type: string
      app_color:
        description: '🎨 لون الأيقونة'
        required: true
        default: '#ea580c'
        type: string
      app_letter:
        description: '🔤 حرف الأيقونة'
        required: true
        default: 'F'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install -g @capacitor/cli @capacitor/core @capacitor/android
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick

      - run: |
          mkdir -p www
          for f in *.html *.js *.css *.json *.svg *.png; do cp $f www/ 2>/dev/null || true; done

      - run: |
          echo '{"name":"app","version":"1.0.0","main":"www/index.html","dependencies":{"@capacitor/android":"^6.0.0","@capacitor/core":"^6.0.0","@capacitor/cli":"^6.0.0"}}' > package.json
          echo "{\"appId\":\"${{ github.event.inputs.app_id }}\",\"appName\":\"${{ github.event.inputs.app_name }}\",\"webDir\":\"www\",\"server\":{\"androidScheme\":\"https\"},\"android\":{\"allowMixedContent\":true}}" > capacitor.config.json

      - run: npm install
      - run: npx cap add android

      - name: ICON
        run: |
          C="${{ github.event.inputs.app_color }}"
          L="${{ github.event.inputs.app_letter }}"
          
          # delete old
          rm -rf android/app/src/main/res/mipmap-*
          
          # make folders
          for d in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$d
          done
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          
          # background
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><shape xmlns:android=\"http://schemas.android.com/apk/res/android\"><solid android:color=\"$C\"/></shape>" > android/app/src/main/res/drawable/ic_launcher_background.xml
          
          # foreground
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><vector xmlns:android=\"http://schemas.android.com/apk/res/android\" android:width=\"108dp\" android:height=\"108dp\"><text android:text=\"$L\" android:textSize=\"65dp\" android:textColor=\"#FFFFFF\" android:fontFamily=\"sans-serif-black\" android:gravity=\"center\" android:x=\"54dp\" android:y=\"72dp\"/></vector>" > android/app/src/main/res/drawable/ic_launcher_foreground.xml
          
          # adaptive
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\"><background android:drawable=\"@drawable/ic_launcher_background\"/><foreground android:drawable=\"@drawable/ic_launcher_foreground\"/></adaptive-icon>" > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          
          # png for all sizes
          convert -size 48x48 xc:"$C" -gravity center -pointsize 28 -fill white -font DejaVu-Sans-Bold -annotate 0 "$L" android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 72x72 xc:"$C" -gravity center -pointsize 40 -fill white -font DejaVu-Sans-Bold -annotate 0 "$L" android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 96x96 xc:"$C" -gravity center -pointsize 52 -fill white -font DejaVu-Sans-Bold -annotate 0 "$L" android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 144x144 xc:"$C" -gravity center -pointsize 76 -fill white -font DejaVu-Sans-Bold -annotate 0 "$L" android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -size 192x192 xc:"$C" -gravity center -pointsize 100 -fill white -font DejaVu-Sans-Bold -annotate 0 "$L" android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          echo "DONE"

      - run: |
          mkdir -p android/app/src/main/res/values
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources><string name=\"app_name\">${{ github.event.inputs.app_name }}</string></resources>" > android/app/src/main/res/values/strings.xml

      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
