name: 🃏 Build APK Professional

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '✏️ اسم التطبيق'
        required: true
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.myapp.name)'
        required: true
        type: string
      app_color:
        description: '🎨 لون الأيقونة (مثال: #ea580c)'
        required: true
        default: '#ea580c'
        type: string
      app_letter:
        description: '🔤 حرف الأيقونة'
        required: true
        default: 'F'
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 ${{ github.event.inputs.app_name }}
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: 📦 Install
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick

      - name: 📁 www
        run: |
          mkdir -p www
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" -o -name "*.svg" -o -name "*.png" \) -exec cp {} www/ \;
          echo "✅ www ready"

      - name: 📄 Config
        run: |
          echo '{"name":"app","version":"1.0.0","main":"www/index.html","dependencies":{"@capacitor/android":"^6.0.0","@capacitor/core":"^6.0.0","@capacitor/cli":"^6.0.0"}}' > package.json
          echo "{\"appId\":\"${{ github.event.inputs.app_id }}\",\"appName\":\"${{ github.event.inputs.app_name }}\",\"webDir\":\"www\",\"server\":{\"androidScheme\":\"https\",\"allowNavigation\":[\"*\"]},\"android\":{\"allowMixedContent\":true}}" > capacitor.config.json

      - run: npm install
      - run: npx cap add android

      - name: 🎨 Icon
        run: |
          rm -rf android/app/src/main/res/mipmap-* android/app/src/main/res/drawable/ic_launcher* 2>/dev/null || true
          mkdir -p android/app/src/main/res/drawable android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi android/app/src/main/res/mipmap-anydpi-v26
          
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><shape xmlns:android=\"http://schemas.android.com/apk/res/android\"><solid android:color=\"${{ github.event.inputs.app_color }}\"/></shape>" > android/app/src/main/res/drawable/ic_launcher_background.xml
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><vector xmlns:android=\"http://schemas.android.com/apk/res/android\" android:width=\"108dp\" android:height=\"108dp\"><text android:text=\"${{ github.event.inputs.app_letter }}\" android:textSize=\"70dp\" android:textColor=\"#FFFFFF\" android:fontFamily=\"sans-serif-black\" android:gravity=\"center\" android:x=\"54dp\" android:y=\"72dp\"/></vector>" > android/app/src/main/res/drawable/ic_launcher_foreground.xml
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\"><background android:drawable=\"@drawable/ic_launcher_background\"/><foreground android:drawable=\"@drawable/ic_launcher_foreground\"/></adaptive-icon>" > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          
          for s in 48:mdpi 72:hdpi 96:xhdpi 144:xxhdpi 192:xxxhdpi; do
            sz=${s%:*}; d=${s#*:}
            convert -size ${sz}x${sz} xc:"${{ github.event.inputs.app_color }}" -gravity center -pointsize $((sz/2)) -fill white -font DejaVu-Sans-Bold -annotate 0 "${{ github.event.inputs.app_letter }}" android/app/src/main/res/mipmap-${d}/ic_launcher.png
          done
          echo "✅ Icon Done"

      - name: 💾 Storage
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors><certificates src="system"/></trust-anchors>
              </base-config>
          </network-security-config>
          EOF
          echo "✅ Storage Done"

      - name: 🎨 Strings
        run: |
          mkdir -p android/app/src/main/res/values
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources><string name=\"app_name\">${{ github.event.inputs.app_name }}</string></resources>" > android/app/src/main/res/values/strings.xml

      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
