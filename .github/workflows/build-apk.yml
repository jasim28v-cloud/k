name: 🃏 Build APK - Joker (All Sites)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'جوكر'
        type: string
      app_id:
        description: '🆔 App ID'
        required: true
        default: 'com.joker.app'
        type: string
      app_color:
        description: '🎨 لون الأيقونة (مثال: #FF0000 للأحمر)'
        required: true
        default: '#FF0000'
        type: string
      app_letter:
        description: '🔤 حرف الأيقونة في المنتصف'
        required: true
        default: 'ج'
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 بناء تطبيق ${{ github.event.inputs.app_name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت Capacitor
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: 📁 تجهيز مجلد www
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.json www/ 2>/dev/null || true
          cp *.svg www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true
          cp *.jpg www/ 2>/dev/null || true
          cp *.jpeg www/ 2>/dev/null || true

      - name: 📄 إنشاء package.json
        run: |
          cat > package.json << EOF
          {
            "name": "${{ github.event.inputs.app_name }}",
            "version": "1.0.0",
            "description": "تطبيق ${{ github.event.inputs.app_name }}",
            "main": "www/index.html",
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF

      - name: ⚙️ إنشاء capacitor.config.json
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "server": { "androidScheme": "https" },
            "android": { "allowMixedContent": true }
          }
          EOF

      - name: 📦 تثبيت المكتبات
        run: npm install

      - name: 🤖 إضافة منصة Android
        run: npx cap add android

      - name: 🎨 إنشاء أيقونة مخصصة
        run: |
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="${{ github.event.inputs.app_color }}"/>
          </shape>
          EOF
          
          cat > android/app/src/main/res/drawable/ic_launcher_foreground.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp">
              <text
                  android:text="${{ github.event.inputs.app_letter }}"
                  android:textSize="65dp"
                  android:textColor="#FFFFFF"
                  android:fontFamily="sans-serif-black"
                  android:gravity="center"
                  android:textAlignment="center"
                  android:x="54dp"
                  android:y="72dp"/>
          </vector>
          EOF
          
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          echo "✅ تم إنشاء أيقونة ${{ github.event.inputs.app_name }}!"

      - name: 🎨 تخصيص اسم التطبيق
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
              <string name="title_activity_main">${{ github.event.inputs.app_name }}</string>
          </resources>
          EOF

      - name: 🔄 مزامنة الملفات
        run: npx cap sync android

      - name: 🔨 بناء APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 رفع ملف APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
