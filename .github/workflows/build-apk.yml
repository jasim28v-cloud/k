name: 🃏 Build APK - Joker (Any Project)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'MyApp'
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.example.myapp)'
        required: true
        default: 'com.example.myapp'
        type: string
      icon_path:
        description: '🖼️ مسار الأيقونة مع الاسم (مثال: icons/myicon.png)'
        required: true
        default: 'icons/icon.png'
        type: string
      icon_bg_color:
        description: '🎨 لون خلفية الأيقونة (مثال: #FFFFFF)'
        required: false
        default: '#FFFFFF'
        type: string
      app_color:
        description: '🎨 لون التطبيق الاحتياطي (عند عدم وجود الصورة)'
        required: false
        default: '#2196F3'
        type: string
      app_letter:
        description: '🔤 حرف الأيقونة الاحتياطي (عند عدم وجود الصورة)'
        required: false
        default: 'A'
        type: string
      app_version:
        description: '📌 إصدار التطبيق'
        required: false
        default: '1.0.0'
        type: string
      app_version_code:
        description: '🔢 رمز الإصدار (رقم صحيح)'
        required: false
        default: '1'
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 بناء ${{ github.event.inputs.app_name }} APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4

      - name: ☕ إعداد Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت الأدوات الأساسية
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick

      - name: 📁 تحضير محتوى التطبيق
        run: |
          mkdir -p www
          
          # نسخ جميع ملفات المشروع
          cp *.html www/ 2>/dev/null || echo "⚠️ لا توجد ملفات HTML"
          cp *.js www/ 2>/dev/null || echo "⚠️ لا توجد ملفات JavaScript"
          cp *.css www/ 2>/dev/null || echo "⚠️ لا توجد ملفات CSS"
          cp *.json www/ 2>/dev/null || echo "⚠️ لا توجد ملفات JSON"
          cp *.svg www/ 2>/dev/null || echo "⚠️ لا توجد ملفات SVG"
          cp *.png www/ 2>/dev/null || echo "⚠️ لا توجد ملفات PNG"
          cp *.jpg www/ 2>/dev/null || echo "⚠️ لا توجد ملفات JPG"
          cp *.jpeg www/ 2>/dev/null || echo "⚠️ لا توجد ملفات JPEG"
          cp *.webp www/ 2>/dev/null || echo "⚠️ لا توجد ملفات WebP"
          cp *.ico www/ 2>/dev/null || echo "⚠️ لا توجد ملفات ICO"
          
          # إنشاء index.html افتراضي إذا لم يوجد
          if [ ! -f www/index.html ]; then
            echo "⚠️ لم يتم العثور على index.html، جاري إنشاء صفحة افتراضية..."
            cat > www/index.html << 'DEFAULT_HTML'
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>تطبيق جاهز</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: 'Segoe UI', Tahoma, sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      min-height: 100vh;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                  }
                  .container {
                      text-align: center;
                      padding: 2rem;
                  }
                  h1 { font-size: 2.5rem; margin-bottom: 1rem; }
                  p { font-size: 1.2rem; opacity: 0.9; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🚀 التطبيق جاهز!</h1>
                  <p>تم بناء التطبيق بنجاح</p>
              </div>
          </body>
          </html>
          DEFAULT_HTML
          fi
          
          echo "📂 محتويات مجلد www:"
          ls -la www/

      - name: 📄 إنشاء package.json
        run: |
          cat > package.json << EOF
          {
            "name": "${{ github.event.inputs.app_name }}-app",
            "version": "${{ github.event.inputs.app_version }}",
            "description": "${{ github.event.inputs.app_name }} - تطبيق Android احترافي",
            "main": "www/index.html",
            "scripts": {
              "build": "echo 'Build complete'",
              "start": "echo 'App started'"
            },
            "keywords": ["android", "capacitor", "app"],
            "author": "Joker Builder",
            "license": "MIT",
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF

      - name: ⚙️ إنشاء إعدادات Capacitor
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": true
            }
          }
          EOF

      - name: 📦 تثبيت الاعتماديات
        run: npm install

      - name: 🤖 إضافة منصة Android
        run: npx cap add android

      - name: 🎨 معالجة الأيقونات بشكل احترافي
        id: icon
        run: |
          # إنشاء المجلدات المطلوبة
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/values
          
          APP_NAME="${{ github.event.inputs.app_name }}"
          APP_COLOR="${{ github.event.inputs.app_color }}"
          APP_LETTER="${{ github.event.inputs.app_letter }}"
          ICON_PATH="${{ github.event.inputs.icon_path }}"
          BG_COLOR="${{ github.event.inputs.icon_bg_color }}"
          
          echo "🎨 بدء معالجة الأيقونات..."
          echo "📱 اسم التطبيق: $APP_NAME"
          
          # التحقق من وجود الصورة ومعالجتها
          if [ -f "$ICON_PATH" ]; then
            echo "✅ تم العثور على الصورة: $ICON_PATH"
            
            # قراءة معلومات الصورة
            dimensions=$(identify -format "%wx%h" "$ICON_PATH" 2>/dev/null || echo "غير معروف")
            file_size=$(du -h "$ICON_PATH" | cut -f1)
            echo "📏 أبعاد الصورة: $dimensions"
            echo "📦 حجم الملف: $file_size"
            
            # 1️⃣ الأيقونة التكيفية الرئيسية (foreground) - 432x432
            convert "$ICON_PATH" \
              -resize 432x432^ \
              -gravity center \
              -extent 432x432 \
              -alpha set \
              android/app/src/main/res/drawable/ic_launcher_foreground.png
            echo "✅ تم إنشاء foreground (432x432)"
            
            # 2️⃣ أيقونات mipmap للأجهزة المختلفة
            convert "$ICON_PATH" -resize 48x48 -gravity center -extent 48x48 \
              android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert "$ICON_PATH" -resize 72x72 -gravity center -extent 72x72 \
              android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert "$ICON_PATH" -resize 96x96 -gravity center -extent 96x96 \
              android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert "$ICON_PATH" -resize 144x144 -gravity center -extent 144x144 \
              android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert "$ICON_PATH" -resize 192x192 -gravity center -extent 192x192 \
              android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "✅ تم إنشاء أيقونات mipmap (48-192)"
            
            # 3️⃣ أيقونة إضافية بحجم كبير
            convert "$ICON_PATH" -resize 512x512 \
              android/app/src/main/res/drawable/app_icon.png
            echo "✅ تم إنشاء أيقونة إضافية (512x512)"
            
            # 4️⃣ نسخة احتياطية للأجهزة القديمة
            cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png \
              android/app/src/main/res/drawable/ic_launcher.png
            
            echo "📱 تم استخدام الصورة الأصلية بنجاح!"
            
          else
            echo "⚠️ الصورة غير موجودة: $ICON_PATH"
            echo "🔍 البحث عن الصور المتاحة..."
            find . -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.webp" \) 2>/dev/null | head -5
            echo ""
            echo "🎨 جاري إنشاء أيقونة افتراضية احترافية..."
            
            # إنشاء أيقونة افتراضية جميلة
            convert -size 1024x1024 xc:"$APP_COLOR" \
              -gravity center \
              -fill white \
              -font Helvetica-Bold \
              -pointsize 500 \
              -annotate 0 "$APP_LETTER" \
              -alpha set \
              android/app/src/main/res/drawable/ic_launcher_foreground.png
            
            # إنشاء أيقونات mipmap من الأيقونة الافتراضية
            convert -size 1024x1024 xc:"$APP_COLOR" \
              -gravity center -fill white \
              -font Helvetica-Bold -pointsize 500 \
              -annotate 0 "$APP_LETTER" \
              -resize 48x48 \
              android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            
            convert -size 1024x1024 xc:"$APP_COLOR" \
              -gravity center -fill white \
              -font Helvetica-Bold -pointsize 500 \
              -annotate 0 "$APP_LETTER" \
              -resize 72x72 \
              android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            
            convert -size 1024x1024 xc:"$APP_COLOR" \
              -gravity center -fill white \
              -font Helvetica-Bold -pointsize 500 \
              -annotate 0 "$APP_LETTER" \
              -resize 96x96 \
              android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            
            convert -size 1024x1024 xc:"$APP_COLOR" \
              -gravity center -fill white \
              -font Helvetica-Bold -pointsize 500 \
              -annotate 0 "$APP_LETTER" \
              -resize 144x144 \
              android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            
            convert -size 1024x1024 xc:"$APP_COLOR" \
              -gravity center -fill white \
              -font Helvetica-Bold -pointsize 500 \
              -annotate 0 "$APP_LETTER" \
              -resize 192x192 \
              android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            
            cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png \
              android/app/src/main/res/drawable/ic_launcher.png
            
            convert -size 1024x1024 xc:"$APP_COLOR" \
              -gravity center -fill white \
              -font Helvetica-Bold -pointsize 500 \
              -annotate 0 "$APP_LETTER" \
              -resize 512x512 \
              android/app/src/main/res/drawable/app_icon.png
            
            echo "✅ تم إنشاء أيقونة افتراضية بالحرف '$APP_LETTER' واللون $APP_COLOR"
          fi
          
          # 5️⃣ إنشاء خلفية الأيقونة التكيفية
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="${BG_COLOR}"
                  android:pathData="M0,0h108v108h-108z"/>
          </vector>
          EOF
          echo "✅ تم إنشاء خلفية الأيقونة التكيفية"
          
          # 6️⃣ إنشاء الأيقونات التكيفية (Android 8+)
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          echo "✅ تم إنشاء الأيقونات التكيفية"
          
          # 7️⃣ إنشاء ملف الألوان
          cat > android/app/src/main/res/values/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">${BG_COLOR}</color>
          </resources>
          EOF
          
          echo ""
          echo "🎉 تم تجهيز جميع الأيقونات بنجاح!"
          echo "📱 الأيقونات التكيفية: ✅"
          echo "📱 أيقونات mipmap: ✅"
          echo "📱 الأيقونات المستديرة: ✅"
          echo "📱 أيقونة إضافية: ✅"
          echo "🎨 لون الخلفية: ${BG_COLOR}"

      - name: 🎨 تخصيص إعدادات Android
        run: |
          # إنشاء ملف strings.xml
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
              <string name="title_activity_main">${{ github.event.inputs.app_name }}</string>
          </resources>
          EOF
          
          # تحديث build.gradle
          cat > android/app/build.gradle << 'BUILDGRADLE'
          apply plugin: 'com.android.application'

          android {
              namespace "${{ github.event.inputs.app_id }}"
              compileSdkVersion 34
              
              defaultConfig {
                  applicationId "${{ github.event.inputs.app_id }}"
                  minSdkVersion 22
                  targetSdkVersion 34
                  versionCode ${{ github.event.inputs.app_version_code }}
                  versionName "${{ github.event.inputs.app_version }}"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              testImplementation 'junit:junit:4.13.2'
              androidTestImplementation 'androidx.test.ext:junit:1.1.5'
              androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
          }
          BUILDGRADLE
          
          echo "✅ تم تخصيص إعدادات Android"

      - name: 🔄 مزامنة Capacitor
        run: npx cap sync android

      - name: 🔨 بناء APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # عرض حجم الملف الناتج
          echo "📦 حجم ملف APK:"
          du -h app/build/outputs/apk/debug/app-debug.apk

      - name: 📤 رفع ملف APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.app_version }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: 📊 عرض ملخص البناء
        run: |
          echo "========================================="
          echo "🎉 تم بناء التطبيق بنجاح!"
          echo "========================================="
          echo "📱 اسم التطبيق: ${{ github.event.inputs.app_name }}"
          echo "🆔 App ID: ${{ github.event.inputs.app_id }}"
          echo "📌 الإصدار: ${{ github.event.inputs.app_version }}"
          echo "🔢 رمز الإصدار: ${{ github.event.inputs.app_version_code }}"
          echo "🖼️ مسار الأيقونة: ${{ github.event.inputs.icon_path }}"
          echo "🎨 لون الخلفية: ${{ github.event.inputs.icon_bg_color }}"
          echo "🎨 اللون الاحتياطي: ${{ github.event.inputs.app_color }}"
          echo "🔤 الحرف الاحتياطي: ${{ github.event.inputs.app_letter }}"
          echo "📦 حجم الملف: $(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
          echo "========================================="
          echo "📲 يمكنك تحميل التطبيق من قسم Artifacts"
          echo "========================================="
