name: 🃏 Build APK - Joker (Any Project)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'MyApp'
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.example.myapp)'
        required: true
        default: 'com.example.myapp'
        type: string
      icon_path:
        description: '🖼️ مسار الأيقونة مع الاسم (مثال: icon-512.png)'
        required: true
        default: 'icon-512.png'
        type: string
      icon_bg_color:
        description: '🎨 لون خلفية الأيقونة (مثلاً: #FFFFFF للأبيض)'
        required: false
        default: '#FFFFFF'
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 Build ${{ github.event.inputs.app_name }} APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Capacitor & ImageMagick
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update -qq && sudo apt-get install -y imagemagick

      - name: 📁 Create www folder
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.json www/ 2>/dev/null || true
          cp *.svg www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true

      - name: 📄 Create package.json
        run: |
          cat > package.json << EOF
          {
            "name": "${{ github.event.inputs.app_name }}-app",
            "version": "1.0.0",
            "description": "${{ github.event.inputs.app_name }} - App",
            "main": "www/index.html",
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF

      - name: ⚙️ Create capacitor.config.json
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "server": { "androidScheme": "https" },
            "android": { "allowMixedContent": true }
          }
          EOF

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🤖 Add Android Platform
        run: npx cap add android

      - name: 🎨 Generate App Icon
        id: icon
        run: |
          # إنشاء المجلدات
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          APP_NAME="${{ github.event.inputs.app_name }}"
          ICON_PATH="${{ github.event.inputs.icon_path }}"
          BG_COLOR="${{ github.event.inputs.icon_bg_color }}"

          if [ -f "$ICON_PATH" ]; then
            echo "✅ تم العثور على الصورة: $ICON_PATH"
            
            # 🔥 تحويل الصورة وإزالة الشفافية نهائياً
            convert "$ICON_PATH" \
              -background "$BG_COLOR" \
              -flatten \
              -resize 432x432 \
              -gravity center \
              -extent 432x432 \
              android/app/src/main/res/drawable/ic_launcher_foreground.png
            
            # إنشاء أيقونات الميب ماب بجميع الأحجام
            convert "$ICON_PATH" -background "$BG_COLOR" -flatten -resize 48x48 -gravity center -extent 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert "$ICON_PATH" -background "$BG_COLOR" -flatten -resize 72x72 -gravity center -extent 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert "$ICON_PATH" -background "$BG_COLOR" -flatten -resize 96x96 -gravity center -extent 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert "$ICON_PATH" -background "$BG_COLOR" -flatten -resize 144x144 -gravity center -extent 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert "$ICON_PATH" -background "$BG_COLOR" -flatten -resize 192x192 -gravity center -extent 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            
            echo "✅ تم إنشاء الأيقونات بجميع الأحجام مع خلفية $BG_COLOR"
          else
            echo "❌ الخطأ: الصورة $ICON_PATH غير موجودة!"
            echo "⚠️ جاري إنشاء أيقونة افتراضية..."
            
            # إنشاء أيقونة افتراضية
            convert -size 432x432 xc:'#2196F3' -gravity center -fill white -font Helvetica -pointsize 200 -annotate 0 'A' android/app/src/main/res/drawable/ic_launcher_foreground.png
            convert -size 48x48 xc:'#2196F3' -gravity center -fill white -font Helvetica -pointsize 24 -annotate 0 'A' android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert -size 72x72 xc:'#2196F3' -gravity center -fill white -font Helvetica -pointsize 36 -annotate 0 'A' android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert -size 96x96 xc:'#2196F3' -gravity center -fill white -font Helvetica -pointsize 48 -annotate 0 'A' android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert -size 144x144 xc:'#2196F3' -gravity center -fill white -font Helvetica -pointsize 72 -annotate 0 'A' android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert -size 192x192 xc:'#2196F3' -gravity center -fill white -font Helvetica -pointsize 96 -annotate 0 'A' android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            
            echo "✅ تم إنشاء أيقونة افتراضية"
          fi

          # خلفية الأيقونة التكيفية
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="$BG_COLOR"/>
          </shape>
          EOF

          # الأيقونة التكيفية
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          cat > android/app/src/main/res/values/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">$BG_COLOR</color>
          </resources>
          EOF

          echo "✅ أيقونة $APP_NAME جاهزة!"

      - name: 🎨 Customize Android Strings
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
              <string name="title_activity_main">${{ github.event.inputs.app_name }}</string>
          </resources>
          EOF

      - name: 🔄 Sync Assets
        run: npx cap sync android

      - name: 🔨 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
