name: 🃏 Build APK - أيقونة احترافية

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'تطبيقي'
        type: string
      app_id:
        description: '🆔 App ID'
        required: true
        default: 'com.myapp.app'
        type: string
      app_letter:
        description: '🔤 الحرف'
        required: true
        default: 'ت'
        type: string
      bg_color:
        description: '🎨 لون الخلفية'
        required: true
        default: '#1A1A2E'
        type: choice
        options:
          - '#1A1A2E'  # أسود مزرق
          - '#16213E'  # كحلي غامق
          - '#0F3460'  # أزرق غامق
          - '#000000'  # أسود
          - '#FFFFFF'  # أبيض
          - '#E94560'  # أحمر
          - '#533483'  # بنفسجي
          - '#E90064'  # وردي غامق
          - '#2B2B2B'  # رمادي غامق
          - '#FF6B6B'  # مرجاني
      icon_style:
        description: '✨ نمط الأيقونة'
        required: true
        default: 'modern'
        type: choice
        options:
          - 'modern'    # عصري مع تدرج
          - 'minimal'   # بسيط وأنيق
          - 'gradient'  # تدرج لوني
          - 'neon'      # تأثير نيون
          - 'glass'     # تأثير زجاجي

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 بناء ${{ github.event.inputs.app_name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل المشروع
        uses: actions/checkout@v4

      - name: ☕ تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 تثبيت Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت الأدوات
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick

      - name: 📁 تجهيز www
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true

      - name: ⚙️ إعداد Capacitor
        run: |
          cat > package.json << EOF
          {
            "name": "${{ github.event.inputs.app_name }}",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF
          
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "server": { "androidScheme": "https" },
            "android": { "allowMixedContent": true }
          }
          EOF
          
          npm install
          npx cap add android

      - name: 🎨 إنشاء أيقونة احترافية
        run: |
          # إعداد المتغيرات
          LETTER="${{ github.event.inputs.app_letter }}"
          BG="${{ github.event.inputs.bg_color }}"
          STYLE="${{ github.event.inputs.icon_style }}"
          
          # إنشاء المجلدات
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}
          mkdir -p android/app/src/main/res/values
          
          # تحديد لون النص (أبيض للخلفيات الغامقة، أسود للفاتحة)
          if [[ "$BG" == "#FFFFFF" ]]; then
            TEXT_COLOR="#1A1A2E"
          else
            TEXT_COLOR="#FFFFFF"
          fi
          
          # إنشاء أيقونة 432x432 حسب النمط المختار
          case $STYLE in
            'modern')
              # خلفية متدرجة مع إطار
              convert -size 432x432 \
                \( xc:"$BG" \) \
                \( -size 432x432 radial-gradient:"$BG"-"#00000000" \) \
                -compose over -composite \
                -fill "$TEXT_COLOR" -font Helvetica-Bold -pointsize 200 \
                -gravity center -annotate 0 "$LETTER" \
                -stroke "$TEXT_COLOR" -strokewidth 8 \
                -fill none -draw "roundrectangle 30,30 402,402 80,80" \
                android/app/src/main/res/drawable/ic_launcher_foreground.png
              ;;
              
            'minimal')
              # بسيط مع ظل
              convert -size 432x432 xc:"$BG" \
                -fill "$TEXT_COLOR" -font Helvetica-Bold -pointsize 220 \
                -gravity center -annotate 0 "$LETTER" \
                \( +clone -background black -shadow 60x10+5+5 \) \
                +swap -background none -layers merge +repage \
                android/app/src/main/res/drawable/ic_launcher_foreground.png
              ;;
              
            'gradient')
              # تدرج لوني مع حرف بارز
              convert -size 432x432 \
                gradient:"$BG"-"#00000000" \
                \( +clone -rotate 45 \) \
                -compose over -composite \
                -fill white -font Helvetica-Bold -pointsize 200 \
                -gravity center -annotate 0 "$LETTER" \
                -alpha on -channel RGBA \
                android/app/src/main/res/drawable/ic_launcher_foreground.png
              ;;
              
            'neon')
              # تأثير نيون
              convert -size 432x432 xc:"#0A0A0A" \
                -fill "$TEXT_COLOR" -font Helvetica-Bold -pointsize 200 \
                -gravity center -annotate 0 "$LETTER" \
                \( +clone -blur 0x20 -fill "$BG" -colorize 100% \) \
                \( +clone -blur 0x10 -fill white -colorize 100% \) \
                -compose over -composite \
                android/app/src/main/res/drawable/ic_launcher_foreground.png
              ;;
              
            'glass')
              # تأثير زجاجي
              convert -size 432x432 xc:"$BG" \
                -fill "rgba(255,255,255,0.15)" \
                -draw "roundrectangle 40,40 392,392 60,60" \
                -fill white -font Helvetica-Bold -pointsize 200 \
                -gravity center -annotate 0 "$LETTER" \
                -alpha on -channel RGBA \
                android/app/src/main/res/drawable/ic_launcher_foreground.png
              ;;
          esac
          
          # إنشاء أحجام مختلفة
          for size in 48 72 96 144 192; do
            case $size in
              48) folder=mdpi;;
              72) folder=hdpi;;
              96) folder=xhdpi;;
              144) folder=xxhdpi;;
              192) folder=xxxhdpi;;
            esac
            convert android/app/src/main/res/drawable/ic_launcher_foreground.png \
              -resize ${size}x${size} \
              android/app/src/main/res/mipmap-${folder}/ic_launcher.png
          done
          
          # خلفية بيضاء للأيقونة التكيفية
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#FFFFFF" android:pathData="M0,0h108v108h-108z"/>
          </vector>
          EOF
          
          # الأيقونة التكيفية
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          echo "✅ تم إنشاء أيقونة احترافية بنمط $STYLE"

      - name: 📝 إعدادات التطبيق
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
          </resources>
          EOF

      - name: 🔄 مزامنة
        run: npx cap sync android

      - name: 🔨 بناء APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
