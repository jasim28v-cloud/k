name: Build APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        default: 'MyApp'
      app_id:
        description: 'App ID (example: com.example.myapp)'
        required: true
        default: 'com.example.myapp'
      icon_path:
        description: 'Icon path (example: icon.png)'
        required: true
        default: 'icon.png'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          sudo apt-get update && sudo apt-get install -y imagemagick
      
      - name: Prepare www
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || echo "<html><body><h1>App</h1></body></html>" > www/index.html
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
      
      - name: Create capacitor.config.json
        run: |
          echo "{\"appId\":\"${{ github.event.inputs.app_id }}\",\"appName\":\"${{ github.event.inputs.app_name }}\",\"webDir\":\"www\"}" > capacitor.config.json
      
      - name: Add Android
        run: npx cap add android
      
      - name: Generate Icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          ICON="${{ github.event.inputs.icon_path }}"
          
          if [ -f "$ICON" ]; then
            convert "$ICON" -resize 432x432 android/app/src/main/res/drawable/ic_launcher_foreground.png
            convert "$ICON" -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert "$ICON" -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert "$ICON" -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert "$ICON" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert "$ICON" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          else
            convert -size 432x432 xc:blue -gravity center -fill white -pointsize 200 -annotate 0 "A" android/app/src/main/res/drawable/ic_launcher_foreground.png
            convert -size 72x72 xc:blue -gravity center -fill white -pointsize 40 -annotate 0 "A" android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert -size 48x48 xc:blue -gravity center -fill white -pointsize 30 -annotate 0 "A" android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert -size 96x96 xc:blue -gravity center -fill white -pointsize 50 -annotate 0 "A" android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert -size 144x144 xc:blue -gravity center -fill white -pointsize 70 -annotate 0 "A" android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert -size 192x192 xc:blue -gravity center -fill white -pointsize 100 -annotate 0 "A" android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          fi
      
      - name: Sync
        run: npx cap sync android
      
      - name: Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: android/app/build/outputs/apk/debug/app-debug.apk
