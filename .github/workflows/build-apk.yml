name: 🃏 Build APK - Joker

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'جوكر'
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.joker.app)'
        required: true
        default: 'com.joker.app'
        type: string
      app_color:
        description: '🎨 لون خلفية الأيقونة (مثال: #FF0000)'
        required: true
        default: '#FF0000'
        type: string
      icon_file:
        description: '🖼️ اسم ملف الأيقونة PNG (ضع الملف في مجلد المشروع)'
        required: true
        default: 'icon.png'
        type: string
      site_folder:
        description: '📁 مجلد موقع الويب (اتركه فارغاً للمجلد الرئيسي)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 بناء تطبيق ${{ github.event.inputs.app_name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل المشروع بالكامل
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # سحب كل الملفات والتاريخ

      - name: ☕ تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 تثبيت Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت Capacitor والأدوات
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: 📁 سحب وتجهيز جميع ملفات الموقع
        run: |
          echo "🔍 جاري سحب جميع ملفات المشروع..."
          
          # عرض جميع الملفات الموجودة
          echo "📋 جميع الملفات في المشروع:"
          find . -type f -not -path './.git/*' -not -path './node_modules/*' | sort
          
          # إنشاء مجلد www
          rm -rf www
          mkdir -p www
          
          # تحديد مجلد المصدر
          SOURCE_DIR="${{ github.event.inputs.site_folder }}"
          if [ -z "$SOURCE_DIR" ]; then
            SOURCE_DIR="."
          fi
          
          echo "📁 جاري نسخ الملفات من: $SOURCE_DIR"
          
          # نسخ جميع الملفات والمجلدات
          if [ "$SOURCE_DIR" = "." ]; then
            # نسخ كل شيء ما عدا المجلدات المستثناة
            shopt -s dotglob
            for item in "$SOURCE_DIR"/*; do
              basename=$(basename "$item")
              if [ "$basename" != ".git" ] && [ "$basename" != ".github" ] && [ "$basename" != "node_modules" ] && [ "$basename" != "android" ] && [ "$basename" != "ios" ] && [ "$basename" != "www" ] && [ "$basename" != "package.json" ] && [ "$basename" != "package-lock.json" ] && [ "$basename" != "capacitor.config.json" ]; then
                echo "  📄 نسخ: $basename"
                cp -r "$item" www/ 2>/dev/null || true
              fi
            done
          else
            # نسخ من مجلد محدد
            cp -r "$SOURCE_DIR"/* www/ 2>/dev/null || true
            cp -r "$SOURCE_DIR"/.* www/ 2>/dev/null || true
          fi
          
          # حذف أي ملفات غير مرغوب فيها داخل www
          rm -rf www/.git www/.github www/node_modules www/.gitignore 2>/dev/null || true
          rm -rf www/package.json www/package-lock.json 2>/dev/null || true
          rm -rf www/android www/ios www/capacitor.config.json 2>/dev/null || true
          rm -rf www/icon.png www/icon.jpg www/icon.jpeg 2>/dev/null || true
          
          echo ""
          echo "✅ تم نسخ جميع ملفات الموقع"
          echo "📊 إحصائيات مجلد www:"
          echo "  📁 عدد الملفات: $(find www -type f | wc -l)"
          echo "  📂 عدد المجلدات: $(find www -type d | wc -l)"
          echo "  💾 الحجم الإجمالي: $(du -sh www | cut -f1)"
          echo ""
          echo "📋 محتويات مجلد www:"
          find www -type f -not -path '*/\.*' | sort | while read file; do
            echo "  📄 ${file#www/} ($(du -h "$file" | cut -f1))"
          done

      - name: 📄 إنشاء package.json
        run: |
          cat > package.json << EOF
          {
            "name": "${{ github.event.inputs.app_name }}",
            "version": "1.0.0",
            "description": "تطبيق ${{ github.event.inputs.app_name }}",
            "main": "www/index.html",
            "scripts": {
              "build": "echo 'Build complete'"
            },
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor/cli": "^6.0.0",
              "@capacitor/filesystem": "^6.0.0",
              "@capacitor/app": "^6.0.0",
              "@capacitor/status-bar": "^6.0.0",
              "@capacitor/splash-screen": "^6.0.0"
            }
          }
          EOF

      - name: ⚙️ إعداد Capacitor
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "allowNavigation": ["*"],
              "cleartext": true
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": true
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "${{ github.event.inputs.app_color }}"
              }
            }
          }
          EOF

      - name: 📦 تثبيت المكتبات
        run: npm install

      - name: 🤖 إنشاء مشروع Android
        run: npx cap add android

      - name: 🎨 إنشاء الأيقونات بجميع المقاسات
        run: |
          ICON_FILE="${{ github.event.inputs.icon_file }}"
          
          # التحقق من وجود ملف الأيقونة
          if [ ! -f "$ICON_FILE" ]; then
            echo "❌ خطأ: ملف الأيقونة $ICON_FILE غير موجود!"
            echo "📁 البحث عن ملفات PNG في المشروع:"
            find . -name "*.png" -not -path './node_modules/*' -not -path './.git/*'
            exit 1
          fi
          
          echo "✅ تم العثور على ملف الأيقونة: $ICON_FILE"
          echo "📏 حجم الصورة الأصلي: $(identify -format '%wx%h' $ICON_FILE)"
          echo ""
          
          # حذف الأيقونات القديمة
          rm -rf android/app/src/main/res/mipmap-*
          rm -rf android/app/src/main/res/drawable/ic_launcher_*
          rm -rf android/app/src/main/res/drawable-*
          
          # إنشاء جميع مجلدات المقاسات
          mkdir -p android/app/src/main/res/mipmap-ldpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/drawable-ldpi
          mkdir -p android/app/src/main/res/drawable-mdpi
          mkdir -p android/app/src/main/res/drawable-hdpi
          mkdir -p android/app/src/main/res/drawable-xhdpi
          mkdir -p android/app/src/main/res/drawable-xxhdpi
          mkdir -p android/app/src/main/res/drawable-xxxhdpi
          
          echo "🎨 جاري إنشاء الأيقونات بجميع المقاسات..."
          echo ""
          
          # إنشاء الأيقونات بجميع المقاسات للـ mipmap
          echo "📱 أيقونات mipmap (للتطبيق):"
          convert $ICON_FILE -resize 36x36   android/app/src/main/res/mipmap-ldpi/ic_launcher.png   && echo "  ✅ ldpi:    36x36"
          convert $ICON_FILE -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png   && echo "  ✅ mdpi:    48x48"
          convert $ICON_FILE -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png   && echo "  ✅ hdpi:    72x72"
          convert $ICON_FILE -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png  && echo "  ✅ xhdpi:   96x96"
          convert $ICON_FILE -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png && echo "  ✅ xxhdpi: 144x144"
          convert $ICON_FILE -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png && echo "  ✅ xxxhdpi:192x192"
          
          echo ""
          echo "🔧 أيقونات drawable (للإشعارات والأماكن الأخرى):"
          convert $ICON_FILE -resize 18x18   android/app/src/main/res/drawable-ldpi/ic_launcher.png   && echo "  ✅ ldpi:    18x18"
          convert $ICON_FILE -resize 24x24   android/app/src/main/res/drawable-mdpi/ic_launcher.png   && echo "  ✅ mdpi:    24x24"
          convert $ICON_FILE -resize 36x36   android/app/src/main/res/drawable-hdpi/ic_launcher.png   && echo "  ✅ hdpi:    36x36"
          convert $ICON_FILE -resize 48x48   android/app/src/main/res/drawable-xhdpi/ic_launcher.png  && echo "  ✅ xhdpi:   48x48"
          convert $ICON_FILE -resize 72x72   android/app/src/main/res/drawable-xxhdpi/ic_launcher.png && echo "  ✅ xxhdpi:  72x72"
          convert $ICON_FILE -resize 96x96   android/app/src/main/res/drawable-xxxhdpi/ic_launcher.png && echo "  ✅ xxxhdpi: 96x96"
          
          echo ""
          echo "🎯 أيقونات إضافية:"
          # نسخ الصورة الأصلية للـ foreground
          cp $ICON_FILE android/app/src/main/res/drawable/ic_launcher_foreground.png && echo "  ✅ Foreground"
          
          # إنشاء أيقونة مربعة للإشعارات
          convert $ICON_FILE -resize 72x72 -background none -gravity center -extent 72x72 android/app/src/main/res/drawable/ic_launcher_square.png && echo "  ✅ Square icon"
          
          # إنشاء أيقونة دائرية
          convert $ICON_FILE -resize 72x72 \( +clone -threshold -1 -draw 'circle 36,36 36,0' \) -alpha off -compose CopyOpacity -composite android/app/src/main/res/drawable/ic_launcher_round.png && echo "  ✅ Round icon"
          
          echo ""
          echo "✅ تم إنشاء جميع الأيقونات بنجاح!"

      - name: 🎨 إنشاء الأيقونة التكيفية (لأندرويد 8+)
        run: |
          # إنشاء خلفية الأيقونة
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="${{ github.event.inputs.app_color }}"/>
          </shape>
          EOF
          
          # إنشاء ملف الأيقونة التكيفية الرئيسية
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          # إنشاء الأيقونة الدائرية التكيفية
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          echo "✅ تم إنشاء الأيقونة التكيفية لأندرويد 8+"

      - name: 🎨 تخصيص تطبيق Android
        run: |
          # تخصيص اسم التطبيق
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
              <string name="title_activity_main">${{ github.event.inputs.app_name }}</string>
              <string name="package_name">${{ github.event.inputs.app_id }}</string>
          </resources>
          EOF
          
          # إنشاء ملف themes
          cat > android/app/src/main/res/values/styles.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">${{ github.event.inputs.app_color }}</item>
                  <item name="colorPrimaryDark">${{ github.event.inputs.app_color }}</item>
                  <item name="colorAccent">${{ github.event.inputs.app_color }}</item>
              </style>
              
              <style name="AppTheme.NoActionBarLaunch" parent="AppTheme.NoActionBar">
                  <item name="android:background">${{ github.event.inputs.app_color }}</item>
              </style>
          </resources>
          EOF
          
          echo "✅ تم تخصيص مظهر التطبيق"

      - name: 🔧 إعداد أذونات Android
        run: |
          MANIFEST_FILE="android/app/src/main/AndroidManifest.xml"
          
          if [ -f "$MANIFEST_FILE" ]; then
            # إضافة الأذونات المطلوبة
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n</manifest>|' $MANIFEST_FILE
            
            # السماح بـ HTTP
            sed -i 's|android:usesCleartextTraffic="false"|android:usesCleartextTraffic="true"|' $MANIFEST_FILE
            
            echo "✅ تم تحديث الأذونات"
          fi

      - name: 🔄 مزامنة المشروع
        run: npx cap sync android

      - name: 🔨 بناء تطبيق APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📊 معلومات الملف الناتج
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ تم بناء APK بنجاح"
            echo "📱 حجم الملف: $(du -h $APK_PATH | cut -f1)"
            echo "📋 اسم التطبيق: ${{ github.event.inputs.app_name }}"
            echo "🆔 App ID: ${{ github.event.inputs.app_id }}"
            echo ""
            echo "📊 إحصائيات الأيقونات المضمنة:"
            find android/app/src/main/res -name "ic_launcher*" -type f | while read icon; do
              echo "  🎨 ${icon#android/app/src/main/res/} ($(du -h "$icon" | cut -f1))"
            done
          else
            echo "❌ فشل بناء APK"
            exit 1
          fi

      - name: 📤 رفع ملف APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: 🎉 اكتمال البناء
        run: |
          echo "🎊 تم بناء تطبيق ${{ github.event.inputs.app_name }} بنجاح!"
          echo "📱 يمكنك تحميل الـ APK من قسم Artifacts"
          echo ""
          echo "📋 ملخص الأيقونات التي تم إنشاؤها:"
          echo "  📱 أيقونات التطبيق: 6 مقاسات (ldpi → xxxhdpi)"
          echo "  🔔 أيقونات الإشعارات: 6 مقاسات (ldpi → xxxhdpi)"
          echo "  🎯 أيقونة تكيفية: لأندرويد 8+"
          echo "  ⭕ أيقونة دائرية: للشاشات المستديرة"
          echo "  ⬜ أيقونة مربعة: للإشعارات"
