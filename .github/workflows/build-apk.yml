name: 🃏 Build APK - Joker

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'جوكر'
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.joker.app)'
        required: true
        default: 'com.joker.app'
        type: string
      app_color:
        description: '🎨 لون خلفية الأيقونة (مثال: #FF0000)'
        required: true
        default: '#FF0000'
        type: string
      icon_file:
        description: '🖼️ اسم ملف الأيقونة PNG (ضع الملف في مجلد المشروع)'
        required: true
        default: 'icon.png'
        type: string
      site_folder:
        description: '📁 مجلد موقع الويب (اتركه فارغاً للمجلد الرئيسي)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 بناء تطبيق ${{ github.event.inputs.app_name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل المشروع بالكامل
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 تثبيت Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت Capacitor والأدوات
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: 📁 سحب وتجهيز جميع ملفات الموقع
        run: |
          echo "🔍 جاري سحب جميع ملفات المشروع..."
          
          rm -rf www
          mkdir -p www
          
          SOURCE_DIR="${{ github.event.inputs.site_folder }}"
          if [ -z "$SOURCE_DIR" ]; then
            SOURCE_DIR="."
          fi
          
          echo "📁 جاري نسخ الملفات من: $SOURCE_DIR"
          
          if [ "$SOURCE_DIR" = "." ]; then
            shopt -s dotglob
            for item in "$SOURCE_DIR"/*; do
              basename=$(basename "$item")
              if [ "$basename" != ".git" ] && [ "$basename" != ".github" ] && [ "$basename" != "node_modules" ] && [ "$basename" != "android" ] && [ "$basename" != "ios" ] && [ "$basename" != "www" ] && [ "$basename" != "package.json" ] && [ "$basename" != "package-lock.json" ] && [ "$basename" != "capacitor.config.json" ]; then
                echo "  📄 نسخ: $basename"
                cp -r "$item" www/ 2>/dev/null || true
              fi
            done
          else
            cp -r "$SOURCE_DIR"/* www/ 2>/dev/null || true
            cp -r "$SOURCE_DIR"/.* www/ 2>/dev/null || true
          fi
          
          rm -rf www/.git www/.github www/node_modules www/.gitignore 2>/dev/null || true
          rm -rf www/package.json www/package-lock.json 2>/dev/null || true
          rm -rf www/android www/ios www/capacitor.config.json 2>/dev/null || true
          rm -rf www/icon.png www/icon.jpg www/icon.jpeg 2>/dev/null || true
          
          echo "✅ تم نسخ جميع ملفات الموقع"

      - name: 🔧 إصلاح مشكلة الخطوط الحمراء في WebView
        run: |
          # إنشاء ملف CSS لإخفاء الخطوط الحمراء
          cat > www/disable-scrollbar.css << 'EOF'
          /* إخفاء شريط التمرير والحدود الحمراء */
          * {
              -webkit-tap-highlight-color: transparent !important;
              outline: none !important;
              scrollbar-width: none !important;
              -ms-overflow-style: none !important;
          }
          
          *::-webkit-scrollbar {
              display: none !important;
              width: 0 !important;
              height: 0 !important;
              background: transparent !important;
          }
          
          html, body {
              overscroll-behavior: none !important;
              -webkit-overflow-scrolling: touch !important;
              scrollbar-width: none !important;
              -ms-overflow-style: none !important;
          }
          
          html::-webkit-scrollbar,
          body::-webkit-scrollbar {
              display: none !important;
              width: 0 !important;
              height: 0 !important;
          }
          
          /* إخفاء أي حدود حمراء أو مؤشرات */
          :focus {
              outline: none !important;
              box-shadow: none !important;
              border-color: transparent !important;
          }
          
          /* إخفاء تأثير الضغط على العناصر */
          a, button, input, textarea, select, div, span, p, h1, h2, h3, h4, h5, h6 {
              -webkit-tap-highlight-color: transparent !important;
              -webkit-user-select: none !important;
              user-select: none !important;
          }
          EOF
          
          # إضافة ملف CSS لجميع صفحات HTML
          find www -name "*.html" -o -name "*.htm" | while read html_file; do
            # التحقق إذا كان الملف يحتوي على </head>
            if grep -q "</head>" "$html_file"; then
              # إضافة رابط CSS قبل </head>
              sed -i 's|</head>|    <link rel="stylesheet" href="disable-scrollbar.css">\n</head>|' "$html_file"
              echo "  ✅ تم إصلاح: $html_file"
            fi
          done
          
          # إنشاء ملف HTML مع الإصلاحات إذا لم يوجد
          if [ ! -f "www/index.html" ] && [ ! -f "www/index.htm" ]; then
            cat > www/index.html << EOF
          <!DOCTYPE html>
          <html dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>${{ github.event.inputs.app_name }}</title>
              <link rel="stylesheet" href="disable-scrollbar.css">
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                      -webkit-tap-highlight-color: transparent;
                      outline: none;
                  }
                  body {
                      font-family: Arial, sans-serif;
                      background: ${{ github.event.inputs.app_color }};
                      color: white;
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      text-align: center;
                      overflow: hidden;
                  }
                  h1 { font-size: 3em; }
              </style>
          </head>
          <body>
              <h1>📱 ${{ github.event.inputs.app_name }}</h1>
          </body>
          </html>
          EOF
          fi

      - name: 📄 إنشاء package.json
        run: |
          cat > package.json << EOF
          {
            "name": "${{ github.event.inputs.app_name }}",
            "version": "1.0.0",
            "description": "تطبيق ${{ github.event.inputs.app_name }}",
            "main": "www/index.html",
            "scripts": {
              "build": "echo 'Build complete'"
            },
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor/cli": "^6.0.0",
              "@capacitor/filesystem": "^6.0.0",
              "@capacitor/app": "^6.0.0",
              "@capacitor/status-bar": "^6.0.0",
              "@capacitor/splash-screen": "^6.0.0"
            }
          }
          EOF

      - name: ⚙️ إعداد Capacitor
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "allowNavigation": ["*"],
              "cleartext": true
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": false
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "${{ github.event.inputs.app_color }}"
              }
            }
          }
          EOF

      - name: 📦 تثبيت المكتبات
        run: npm install

      - name: 🤖 إنشاء مشروع Android
        run: npx cap add android

      - name: 🎨 إنشاء الأيقونات بجميع المقاسات
        run: |
          ICON_FILE="${{ github.event.inputs.icon_file }}"
          
          if [ ! -f "$ICON_FILE" ]; then
            echo "❌ خطأ: ملف الأيقونة $ICON_FILE غير موجود!"
            exit 1
          fi
          
          echo "✅ تم العثور على ملف الأيقونة: $ICON_FILE"
          
          rm -rf android/app/src/main/res/mipmap-*
          rm -rf android/app/src/main/res/drawable/ic_launcher_*
          rm -rf android/app/src/main/res/drawable-*
          
          mkdir -p android/app/src/main/res/mipmap-ldpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/drawable
          
          convert $ICON_FILE -resize 36x36   android/app/src/main/res/mipmap-ldpi/ic_launcher.png
          convert $ICON_FILE -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert $ICON_FILE -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert $ICON_FILE -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert $ICON_FILE -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert $ICON_FILE -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          cp $ICON_FILE android/app/src/main/res/drawable/ic_launcher_foreground.png
          
          echo "✅ تم إنشاء جميع الأيقونات"

      - name: 🎨 إنشاء الأيقونة التكيفية
        run: |
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="${{ github.event.inputs.app_color }}"/>
          </shape>
          EOF
          
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

      - name: 🎨 تخصيص تطبيق Android وإخفاء التمرير
        run: |
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
              <string name="title_activity_main">${{ github.event.inputs.app_name }}</string>
          </resources>
          EOF
          
          cat > android/app/src/main/res/values/styles.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">${{ github.event.inputs.app_color }}</item>
                  <item name="colorPrimaryDark">${{ github.event.inputs.app_color }}</item>
                  <item name="colorAccent">${{ github.event.inputs.app_color }}</item>
                  <item name="android:scrollbarThumbVertical">@android:color/transparent</item>
                  <item name="android:scrollbarSize">0dp</item>
              </style>
          </resources>
          EOF

      - name: 🔧 إعداد أذونات Android
        run: |
          MANIFEST_FILE="android/app/src/main/AndroidManifest.xml"
          
          if [ -f "$MANIFEST_FILE" ]; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n</manifest>|' $MANIFEST_FILE
            sed -i 's|android:usesCleartextTraffic="false"|android:usesCleartextTraffic="true"|' $MANIFEST_FILE
          fi

      - name: 🔧 تعديل WebView لإخفاء الخطوط الحمراء
        run: |
          # البحث عن ملف MainActivity
          MAIN_ACTIVITY=$(find android -name "MainActivity.java" -type f)
          
          if [ -f "$MAIN_ACTIVITY" ]; then
            # إضافة إعدادات WebView لإخفاء التمرير والحدود
            sed -i '/import android.os.Bundle;/a\
          import android.webkit.WebView;\
          import android.webkit.WebSettings;' "$MAIN_ACTIVITY"
            
            sed -i '/super.onCreate(savedInstanceState);/a\
          \
          // إعدادات WebView لإخفاء الخطوط الحمراء والتمرير\
          WebView webView = new WebView(this);\
          webView.setVerticalScrollBarEnabled(false);\
          webView.setHorizontalScrollBarEnabled(false);\
          webView.setScrollBarStyle(View.SCROLLBARS_OUTSIDE_OVERLAY);\
          webView.setOverScrollMode(View.OVER_SCROLL_NEVER);' "$MAIN_ACTIVITY"
            
            # إضافة import View
            sed -i '/import android.os.Bundle;/a\
          import android.view.View;' "$MAIN_ACTIVITY"
            
            echo "✅ تم تعديل MainActivity"
          fi

      - name: 🔄 مزامنة المشروع
        run: npx cap sync android

      - name: 🔨 بناء تطبيق APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 رفع ملف APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: 🎉 اكتمال البناء
        run: |
          echo "🎊 تم بناء تطبيق ${{ github.event.inputs.app_name }} بنجاح!"
          echo "✅ تم إصلاح مشكلة الخطوط الحمراء"
          echo "📱 يمكنك تحميل الـ APK من قسم Artifacts"
