name: 🃏 Build APK Professional

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '✏️ اسم التطبيق'
        required: true
        type: string
      app_id:
        description: '🆔 App ID'
        required: true
        type: string
      app_color:
        description: '🎨 لون الأيقونة'
        required: true
        default: '#ea580c'
        type: string
      app_letter:
        description: '🔤 حرف الأيقونة'
        required: true
        default: 'F'
        type: string

permissions:
  contents: write

jobs:
  build:
    name: 📱 ${{ github.event.inputs.app_name }}
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: 📦 Install Tools
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick

      - name: 📁 Prepare www
        run: |
          mkdir -p www
          for ext in html js css json svg png jpg webp ico; do
            cp *.$ext www/ 2>/dev/null || true
          done
          echo "✅ Files copied"
          ls www/

      - name: 📄 Package Config
        run: |
          echo '{"name":"app","version":"1.0.0","main":"www/index.html","dependencies":{"@capacitor/android":"^6.0.0","@capacitor/core":"^6.0.0","@capacitor/cli":"^6.0.0"}}' > package.json
          echo "{\"appId\":\"${{ github.event.inputs.app_id }}\",\"appName\":\"${{ github.event.inputs.app_name }}\",\"webDir\":\"www\",\"server\":{\"androidScheme\":\"https\",\"allowNavigation\":[\"*\"]},\"android\":{\"allowMixedContent\":true}}" > capacitor.config.json

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🤖 Setup Android
        run: npx cap add android

      - name: 🎨 Build App Icon
        run: |
          # حذف الأيقونات القديمة
          rm -rf android/app/src/main/res/mipmap-* 2>/dev/null || true
          rm -f android/app/src/main/res/drawable/ic_launcher* 2>/dev/null || true
          
          # إنشاء المجلدات
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          C="${{ github.event.inputs.app_color }}"
          L="${{ github.event.inputs.app_letter }}"
          
          # XML: خلفية
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="${C}"/>
          </shape>
          EOF
          
          # XML: حرف
          cat > android/app/src/main/res/drawable/ic_launcher_foreground.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp">
              <text android:text="${L}" android:textSize="70dp"
                  android:textColor="#FFFFFF"
                  android:fontFamily="sans-serif-black"
                  android:gravity="center"
                  android:x="54dp" android:y="72dp"/>
          </vector>
          EOF
          
          # XML: Adaptive Icon
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          # PNG: لكل كثافة
          for size in 48:mdpi 72:hdpi 96:xhdpi 144:xxhdpi 192:xxxhdpi; do
            s=${size%:*}; d=${size#*:}
            convert -size ${s}x${s} xc:"${C}" \
              -gravity center -pointsize $((s/2)) \
              -fill white -font DejaVu-Sans-Bold \
              -annotate 0 "${L}" \
              android/app/src/main/res/mipmap-${d}/ic_launcher.png
          done
          
          echo "✅ Icon ready: ${L} on ${C}"

      - name: 💾 Configure Storage
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system"/>
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF
          echo "✅ Storage configured"

      - name: 🎨 App Name
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
          </resources>
          EOF

      - name: 🔄 Sync
        run: npx cap sync android

      - name: 🔨 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
