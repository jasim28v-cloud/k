name: 📱 Build APK with Local Files

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'تطبيقي'
        type: string
      app_id:
        description: '🆔 App ID'
        required: true
        default: 'com.myapp.app'
        type: string
      app_color:
        description: '🎨 لون الأيقونة (#RRGGBB)'
        required: true
        default: '#2196F3'
        type: string
      app_letter:
        description: '🔤 حرف الأيقونة'
        required: true
        default: 'A'
        type: string
      source_folder:
        description: '📁 مجلد المصدر (اتركه فارغاً للمجلد الرئيسي)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت الأدوات
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: 📁 نسخ ملفات الموقع
        run: |
          mkdir -p www
          
          # تحديد مصدر الملفات
          if [ -n "${{ github.event.inputs.source_folder }}" ] && [ -d "${{ github.event.inputs.source_folder }}" ]; then
            echo "📁 نسخ من: ${{ github.event.inputs.source_folder }}"
            cp -r ${{ github.event.inputs.source_folder }}/* www/
          else
            echo "📁 نسخ من المجلد الرئيسي"
            # نسخ كل الملفات ما عدا النظامية
            for file in *; do
              if [ "$file" != "www" ] && [ "$file" != ".git" ] && [ "$file" != ".github" ] && [ "$file" != "node_modules" ] && [ "$file" != "android" ]; then
                cp -r "$file" www/
              fi
            done
          fi
          
          # إنشاء index.html إذا لم يوجد
          if [ ! -f "www/index.html" ]; then
            cat > www/index.html << EOF
          <!DOCTYPE html>
          <html dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>${{ github.event.inputs.app_name }}</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: Arial, sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      min-height: 100vh;
                      background: ${{ github.event.inputs.app_color }};
                      color: white;
                      text-align: center;
                  }
                  h1 { font-size: 3em; margin-bottom: 20px; }
                  p { font-size: 1.2em; opacity: 0.9; }
              </style>
          </head>
          <body>
              <div>
                  <h1>📱 ${{ github.event.inputs.app_name }}</h1>
                  <p>✅ التطبيق يعمل محلياً</p>
              </div>
          </body>
          </html>
          EOF
          fi
          
          echo "✅ عدد الملفات: $(find www -type f | wc -l)"
          echo "📋 المحتويات:"
          ls -la www/

      - name: ⚙️ إعداد Capacitor
        run: |
          # package.json
          cat > package.json << EOF
          {
            "name": "app",
            "version": "1.0.0",
            "main": "www/index.html",
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF
          
          # capacitor.config.json - الأهم: androidScheme: file للتشغيل المحلي
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "file"
            },
            "android": {
              "allowMixedContent": true,
              "webContentsDebuggingEnabled": false
            }
          }
          EOF

      - name: 📦 تثبيت وإنشاء Android
        run: |
          npm install
          npx cap add android

      - name: 🔧 إعداد WebView للتحميل المحلي
        run: |
          # البحث عن MainActivity.java
          MAIN_FILE=$(find android/app/src/main/java -name "MainActivity.java")
          
          if [ -f "$MAIN_FILE" ]; then
            # إضافة import والإعدادات
            cat > temp_main.java << 'JAVAEOF'
          package com.getcapacitor.myapp;

          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // إعدادات التحميل المحلي
                  WebView webView = getBridge().getWebView();
                  WebSettings webSettings = webView.getSettings();
                  
                  // تمكين JavaScript
                  webSettings.setJavaScriptEnabled(true);
                  
                  // تمكين التخزين المحلي
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setDatabaseEnabled(true);
                  
                  // السماح بالوصول للملفات المحلية
                  webSettings.setAllowFileAccess(true);
                  webSettings.setAllowContentAccess(true);
                  webSettings.setAllowFileAccessFromFileURLs(true);
                  webSettings.setAllowUniversalAccessFromFileURLs(true);
                  
                  // دعم الفيديو والصوت
                  webSettings.setMediaPlaybackRequiresUserGesture(false);
                  
                  // عرض كامل
                  webSettings.setLoadWithOverviewMode(true);
                  webSettings.setUseWideViewPort(true);
                  
                  // السماح بالمحتوى المختلط
                  webSettings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
              }
          }
          JAVAEOF
            
            # استبدال الملف
            cp temp_main.java "$MAIN_FILE"
            echo "✅ تم إعداد WebView للتحميل المحلي"
          fi

      - name: 🎨 إنشاء الأيقونة
        run: |
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          
          # الخلفية
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="${{ github.event.inputs.app_color }}"/>
          </shape>
          EOF
          
          # الحرف في المنتصف
          cat > android/app/src/main/res/drawable/ic_launcher_foreground.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <text
                  android:text="${{ github.event.inputs.app_letter }}"
                  android:textSize="65dp"
                  android:textColor="#FFFFFF"
                  android:fontFamily="sans-serif-black"
                  android:gravity="center"
                  android:textAlignment="center"
                  android:x="54dp"
                  android:y="72dp"/>
          </vector>
          EOF
          
          # أيقونة متكيفة
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          echo "✅ تم إنشاء الأيقونة"

      - name: 🎨 تخصيص التطبيق
        run: |
          mkdir -p android/app/src/main/res/values
          
          # اسم التطبيق
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
          </resources>
          EOF

      - name: 🔧 صلاحيات Android
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # إضافة الصلاحيات
          sed -i '/<application/i \
    <uses-permission android:name="android.permission.INTERNET"/>\
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>' "$MANIFEST"
          
          # السماح بـ HTTP
          sed -i 's|android:usesCleartextTraffic="false"|android:usesCleartextTraffic="true"|' "$MANIFEST"
          
          echo "✅ تم إضافة الصلاحيات"

      - name: 🔄 مزامنة
        run: npx cap sync android

      - name: 🔨 بناء APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: ✅ اكتمال
        run: |
          echo "🎉 تم بناء التطبيق بنجاح!"
          echo "📱 الاسم: ${{ github.event.inputs.app_name }}"
          echo "🆔 App ID: ${{ github.event.inputs.app_id }}"
          echo "✅ التطبيق يعمل محلياً - جميع الملفات مخزنة داخل APK"
