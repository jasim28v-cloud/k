name: 💙 SOREX - Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 سحب المستودع
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 إعداد Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 🔧 تشغيل البناء لتوليد الملفات
        run: |
          echo "💙 بدء توليد SOREX..."
          python scraper.py
          echo "✅ تم توليد جميع الملفات"
      
      - name: 🚀 رفع الملفات إلى GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "💙 SOREX - Auto Deploy [skip ci]"
          commit_author: "SOREX Bot 🤖 <actions@github.com>"
          file_pattern: '*.html *.js *.json'
