name: 🌹 ROSE SPHERE - Auto Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_message:
        description: 'وصف النشر'
        required: false
        default: '🌹 Rose Sphere Auto Deploy'

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 سحب المستودع
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 إعداد Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 🔧 تشغيل scraper.py لتوليد الملفات
        run: |
          echo "🌹 بدء توليد Rose Sphere..."
          python scraper.py
          echo "✅ تم توليد جميع الملفات"
      
      - name: 📋 عرض الملفات المنشأة
        run: |
          echo ""
          echo "🌹 ROSE SPHERE - ملفات المنشأة"
          echo "📁 HTML: $(ls -1 *.html 2>/dev/null | wc -l)"
          echo "📁 JS: $(ls -1 *.js 2>/dev/null | wc -l)"
          echo "📊 الأسطر: $(cat *.html *.js 2>/dev/null | wc -l)"
      
      - name: 🚀 رفع الملفات إلى GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🌹 Rose Sphere - Auto Deploy [skip ci]"
          commit_author: "Rose Sphere Bot 🤖 <actions@github.com>"
          file_pattern: '*.html *.js'

  notify:
    needs: generate-and-deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📊 ملخص النشر
        run: |
          if [ "${{ needs.generate-and-deploy.result }}" == "success" ]; then
            echo "🟢 تم النشر بنجاح! 🌹"
          else
            echo "🔴 فشل النشر!"
          fi
